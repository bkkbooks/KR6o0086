body:
  text: 釋摩訶衍論十卷龍樹菩薩造沙門法敏集不動本原論九甚深玄理論十大乘起信論如是十論其數雖別殊而建立其種而數同一種焉次説藏差別藏有幾數幾藏所攝摩訶衍論何所攝耶頌曰或五十一藏或唯十如經總三藏所攝論或通或別論曰五十一者別因果故表功德故引行者故金剛契經説佛子我當為汝無礙言辭宣説開示五十因藏及一果藏故或有十藏一者唯立一藏總攝諸法謂法界法輪藏圓滿契經説一切衆生所有言音莫非如來法輪攝故二立二藏總攝諸法謂聲聞藏及菩薩藏總持契經説法門雖無邊不出二種藏故三立三種藏總攝諸法謂如來藏光明契經説過於恆沙一切諸佛唯當宣説聲聞法藏菩薩法藏如來法藏更無餘道故四立四藏總攝諸法謂加補特伽羅藏道品契經説佛子諦聽為汝解説仁藏義藏禮藏智藏及與信藏并聲聞藏及菩薩藏大覺藏所以者何一切行者漸次轉勝次第之法故五立五藏總攝諸法謂加天藏天子契經説佛告邪論不可言説清淨報空我為大衆廣大宣説淨藏人藏并二乘藏一切諸佛大覺法藏故六立六藏總攝諸法謂加捺落迦藏怖畏契經説我不動坐分別宣説八萬四千捺落迦藏如前所説五種藏故七立七藏總攝諸法謂加魔羅鳩多耶藏班母契經説我今實言為班母等一億七萬三千大衆分別宣説五萬一千三百二種鬼神道藏如前所説六種藏故八立八藏總攝諸法謂加鍵婆陀那跋藏龍王契經説難陀龍王發八千問問於如來佛開十億傍生道藏如前所説七種藏故九立九藏總攝諸法謂加器世間藏世界契經説爾時世尊告樹神言善哉善哉如汝所説若欲聞者我今為汝分別演説所依止藏如前所説八種藏故十立十藏總攝諸法謂加雜亂藏音聲契經説我今開示八種雜藏如前所説九種藏故如是諸藏總攝十億八千法藏根本三藏或攝十藏云何為三一素怛藍藏二毗奈耶藏三阿毗達磨藏摩訶衍論或諸藏攝或唯阿毗達磨藏攝是故頌言或通或別通謂總通別謂簡別持其行法隨應不失所以立名曰藏焉次説經差別有幾數幾經所攝今摩訶衍論何等經為依論曰凡集一代種種諸教有一百億部如是諸經總十二部攝云何十二一修多羅二祇夜三毗伽羅那四伽陀五憂陀那六尼陀那七阿婆陀那八伊帝曰多伽九闍陀伽十毗佛略十一阿浮陀達磨十二憂婆提舍摩訶衍論所依本經或通或別通謂總通別謂簡別摩訶衍論文狹句少甚極微少何故無量無邊契經之海通為依耶如婆薩伊伽諾故如標多羅呾提故是故無失別所依經其數幾有何等名字眷屬各幾頌曰總一百契經光明大覺等初五十各百後五十各千論曰摩訶衍論別所依經總有一百云何為百一光明大覺經二甚深順理經三金剛三昧經四諸法無行經五樹林説法經六無盡一地經七清淨如如經八自性自體經九大乘同性經十阿梨耶識經十一果圓滿經十二虗空等經十三三三昧經十四一心法經十五本性智經十六真法界經十七攝無量經十八最上極經十九維摩詰經二十楞伽王經二十一中實經二十二無始經二十三十因經二十四輪轉經二十五慈雲經二十六器心經二十七無位經二十八賢聖經二十九隱密經三十華嚴經三十一大品經三十二寂滅經三十三聖軌經三十四遍緣經三十五熏習經三十六佛性經三十七玄理經三十八楞伽經三十九本業經四十蘊高山經四十一歸本經四十二真修經四十三八德經四十四佛慧經四十五緣起經四十六一體經四十七白佛經四十八大海經四十九無相經五十遍真如經五十一十種如來藏經五十二三身本有經五十三八識通達緣經五十四衆生身等法經五十五諸佛無盡藏經五十六讚歎不善品經五十七諸法同一相經五十八一體大悲觀經五十九如如本智慧經六十塵塵法界剎土經六十一輪轉本際經六十二法界法輪經六十三大智本有經六十四平等法界經六十五四相常住經六十六真如一相經六十七流轉不動經六十八寂靜涅槃經六十九通達音聲經七十如來自相經七十一夫人經七十二法門經七十三八喻經七十四中在經七十五總持經七十六不動經七十七天智經七十八道智經七十九本覺經八十大無量經八十一自然本果經八十二甚深法藏經八十三一道清淨經八十四十種妄想經八十五法門顯了經八十六境界圓滿經八十七光明實智經八十八因果同體經八十九心神不空經九十真智無生行經九十一無礙解脫經九十二隨緣增長經九十三法性實際經九十四廣大虗空經九十五本因緣起經九十六諸法無為經九十七本來清淨經九十八修行道地經九十九不修具德經百摩訶薩雲若經如是百經眷屬如次初半各百後半各千舉經之目屬論之綱下當隨文開示顯説次當説造人契經異説其數幾有今馬鳴師何所攝耶頌曰總有六馬鳴契經異説故然隨機應故無有相違失論曰凡集一代諸契經中種種異文總有六種一大乘本法契經説無上大覺尊説入涅槃緣馬鳴菩薩即從座起頂禮佛足合掌恭敬向佛世尊説偈頌曰大慈滿足無上尊無邊劫海備萬行唯慈悲群生類故而佛自言入涅槃我及一切諸大衆冥冥而亂失心神大慈滿足世尊尚棄自子等往異界況我慈悲未滿足隨佛往異界誰謗爾時馬鳴説此偈已覩佛眼精徐自命終二變化功德契經説爾時世尊告馬鳴言我滅度後三百餘歲汝當承我加力以種種方便法利益安樂末代衆生若我不加力汝當不能自三摩訶摩耶經説如來滅後六百歲已九十六種諸外道等邪見競興毀滅佛法有一比丘名曰馬鳴善説法要降伏一切諸外道輩四常德三昧契經説佛滅度後八百歲中有一智人名曰馬鳴或外道衆或佛家衆破諸外道建立佛法五摩尼清淨經曰佛泥洹後一百餘歲馬鳴大士出現於世守護正法安立佛幢六勝頂王契經説如來成道第十七日有一外道名曰迦羅諾鳩尸摩變化其身作大龍王出現八萬六千頭八萬六千舌一時發起八萬六千相違難問問於如來如來即作百重答説通彼切難如是問答已佛告龍王言善哉善哉馬鳴沙門為護法城故以破壞相建立佛法耐也常如是修常如是行勿小遊行普遍遊行於是龍王以其本形捨畜生相無上尊前頂禮和南以歡喜貌向佛世尊而説偈言善哉善哉言經聽於我聞假耶實耶自極疑於我心我非畜生身或非外道衆而贊化為生變化如是形世尊如鏡知我沒於是界出於餘世界如教普遊行爾時馬鳴説此偈已如入禪定入於寂室是名為六如是諸經各各別説隨機現應無相違過馬鳴菩薩當何位人何域誕生何因馬鳴頌曰本大光明佛因不動中位西天竺出現從過去立名論曰馬鳴菩薩若尅其本大光明佛若論其因第八地位菩薩西天誕生盧伽為父瞿那為母同生利益過去世中有一大王名曰輪陀有千白鳥皆悉好聲若鳥出聲大王增德若不出聲大王損德如是諸鳥若見白馬即出其聲若不見時常不出聲爾時大王遍求白馬終日不得作如是言若外道衆此鳥鳴者都破佛教獨尊獨信若佛弟子此鳥鳴者都破外道教獨尊獨信爾時菩薩用神通力現千白馬鳴千白鳥紹隆正法令不斷絶是故世尊名曰馬鳴已説人別相次唱本作釋本曰歸命盡十方最勝業遍智色無礙自在救世大悲者論曰此一頌中即有二門一總攝一切衆命門二歸向圓滿大覺門總攝者通攝一切十方世界中諸有衆命根故歸向者用如是衆命歸仰於滿足大慈悲人故如本歸命盡十方最勝業遍智色無礙自在救世大悲者故論師舉幾德讚歎大覺尊各其相如何頌曰總八萬四千四十八種德最勝等各十智無礙各四及八萬四千色相差別故功德雖無量終不出此數論曰爾時馬鳴菩薩總舉八萬四千四十八種功德奉仰讚歎無上大覺佛果滿位中功德淨品雖有無量無邊而終不出數量是故馬鳴總相讚歎云何為八萬四千功德色相差別故成八萬四千云何為四十最勝業遍各十種故云何為八智及無礙各有四種故云何為十最一超過最遠離二乘地故二出離最永離三界域故三對治最頓斷四住地故四厭離最已過五蘊聚落故五離愛最永別六道岐故六威德最勝退七惡軍故七兵衆最皆盡八邪林故八智慧劒最決斷九結科故九解脫最斷除十纏繩故十勇猛最摧伏九十六種外道故於契經中十種第一云何為十勝一力勝具足十力故二無畏勝具足四無畏故三不共勝具足十八不共法故四道品勝具足三十七品道故五變化勝具足百千種變化故六言音勝具足八十八種梵音故七端嚴勝具足三十二種丈夫相故八吉祥勝隨作境界處出生增長功德善根故九難得勝於三界中獨尊一故十住處勝所居宮殿以九萬八千微妙圓滿而所莊嚴故於契經中十種殊勝云何為十業一自然業所作自在故二平等業教化利益無差別故三相應業隨機出現故四具足業圓滿福智二資糧故五無盡業無邊際故六同生業隨趣受生故七無著業遠離塵纍如蓮華故八依止業作歸依處如大地故九無厭業攝生無窮如大海故十通達業無有障礙如虗空故於契經中十種作用云何為十遍一根遍佛諸色根各各周遍法界故二識遍佛諸心識無所不達故三境界遍圓智所緣無分界故四壽命遍不可思議故五眷屬遍不可測量故六功德遍一一功德等虗空界故七慈悲遍無簡擇故八言説遍佛言音聲無所不至故九證遍無所不窮故十無等遍無與等故於契經中十種周遍云何為四智一光明無盡藏智能出生十億一千智慧門故二一味一相智通達恆沙一切諸法無差別故三大悲無邊智隨起一化遍滿一切十方世界故四無為寂滅智遠離一切起動作業故於契經中四種圓智云何為四無礙一法無礙了知諸法實相實性故二義無礙了智諸法共差別相及生滅相故三辭無礙不壞假名而説實相故四樂説無礙發無邊言説契經海次第不斷絶故於契經中四種解脫智自在之言皆通於上故不別釋色相名義如大總持中廣顯説已説覺寶次説法僧本曰及彼身體相法性真如海無量功德藏如實修行等論曰此一頌中復有二門一體攝一切衆身門所謂盡攝一切無量衆生生滅流轉無常身故如本彼身體相故二總達法藏僧伽門以如是衆身總達於諸甚深法藏一切如實修行者故等言總通和南之意論師依幾法僧而和南耶其相云何頌曰總歸依十四僧十法四故或兼上下故有多類僧衆論曰馬鳴菩薩總歸依於十四德處十僧四法各差別故云何為四法教理行果各差別故法謂教法所謂隨順機根一切契經之海性真如謂理法於一切法體性平等離虗妄之假絶執著之實故海謂果法於妙覺果萬德圓滿無有窮盡如大海故無量功德藏謂行法六度萬行淨品眷屬不可思議超過數量故如謂十種真如實修行謂十種正智證真如理於真實智建立僧名理智和通能所一味平等平等無諍論故何故取命標十方耶為欲顯示所攝命根廣大圓滿無邊際故何故取身標其相耶為欲顯示四相所亂一切衆生皆悉攝取欲令獲得金剛常住不動身故何故八聖唯不歸自身命乃通取一切無量衆生所有身命歸於三寶由明了知一切衆生平等平等唯一真如無有別異衆生身命及我身命一味一相不相離故是故頌言等等言極甚深何故攝取一切衆生無量身命歸於三寶成和南相由十方三世一切諸佛皆悉歡喜十方三世一切諸菩薩悉皆讚歎十方三世一切諸法藏常恆流布不斷絶故馬鳴菩薩證於不動地下地功德悉皆滿足何故下位諸僧皆悉和南由能歸人皆非同於自德位故若自歸依唯應和南不動地滿并上二地若爾何故不取地前非無歸人故不別舉以上兼下影顯示故法雲菩薩能歸人當依何僧於妙覺地有真實僧故無過失若爾何故不別舉耶以下兼上影顯示故是故頌言或兼上下故有多類僧衆已説法僧次説本趣本曰為欲令衆生除疑捨邪執起大乘正信佛種不斷故論曰此一頌中則有二門一斷絶障縛門二連續解脫門斷絶門中有四差別一決定信心門為令一切無量衆生斷除疑惑心發起堅固信決定於甚深大乘正道故二遠離捨心門為令一切無量衆生遠離厭捨心增長欲樂意精進於甚深大乘正道故三對治邪論門為令對治九十六種諸大外道并眷屬故四種大魔及眷屬衆魔斷除一切諸世論趣入於大乘甚深正道故四除遣執著門為令一切無量異生及諸二乘一切菩薩斷除五種人見二種法執證得二種對治回向於甚深大乘正道故連續門中有三差別一不斷大覺門為令集成萬行之因莊嚴大覺之果無上法王不斷絶故二不斷法藏門為令出現勝妙梵響宣説一切契經之海八萬四千法藏不斷絶故三不斷僧伽門為令修地前地上之大道故建真如法界之宮殿住正後二僧而不斷絶故如本佛種不斷故頌衆生言分際云何為欲對治何等斷故建立三寶不斷耶頌曰通攝三聚人未得圓滿故對四種斷故建立三不斷論曰馬鳴菩薩通緣三聚而為境界所以者何由未證得圓滿果故然三聚門有其三種一十信前名為邪定聚不能信業果報等故三賢及十信名為正定聚決定安立不退位故十種信心名為不定聚或進或退未決定故二十信前并十信心名為邪定聚皆無根故無上大覺果名為正定聚以滿足故三賢及十聖名為不定聚皆未究竟故三十信前名為邪定聚無樂求心故十聖名為正定聚以得真證故十信三賢名為不定聚未得真證故馬鳴菩薩須彼初門為欲對治四種斷故建立三寶不斷之義一疑惑斷由猶豫心不能決定斷三寶種故二然捨斷由愛有心不能樂法斷三寶種故三見邪斷由妄想心不能正見斷三寶種故四定執斷由實有心不能離著斷三寶種故已説本趣次開總體本曰有法能起摩訶衍信根是故應説論曰此門有二門一能入門所謂於所詮理善趣入故二所入門善為彼法作依止故有法者總標十六能入門法能起信根者總標門法作業之相摩訶衍者總標十六所入法體并及不二摩訶衍體信決定進心攝生長行法若為入理無超此二故曰信根復次信謂十信根謂從發心住乃至法雲地所以者何初信無根隨緣進退後信轉勝堅固不動信根有幾義各其相云何頌曰各有十種義澄淨下轉等論曰信有十種義一澄淨義能令心性清淨明白故二決定義能令心性淳至堅固故三歡喜義能令斷除諸憂惱故四無厭義能令斷除懈怠心故五隨喜義於他勝行發起同心故六尊重義於諸有德不輕賤故七隨順義隨所見聞不逆違故八讚歎義隨彼勝行志心稱歎故九不壞義專在一心不忘失故十愛樂義能令成就慈悲心故根有十種義一下轉義能除憍慢故二隱密義能詮甚深理故三出生義生長種種諸功德故四堅固義皆悉攝持不闕失故五相續義轉轉增長無斷絶故六出離義地地轉勝漸漸遠離故七集成義修集種種諸道品故八茂榮義以諸行德而所莊嚴可愛樂故九具足義等覺位中圓滿因行故十高勝義於妙覺果最勝廣大無能超過故能入所入種種差別立義分中自當顯説本曰説有五分一者因緣分二者立義分三者解釋分四者修行信心分五者勸修利益分論曰此下明建立門何故次第如是教法出現法如是故此義云何為欲顯示上味妙藥當由所對疾障出現能化教法定由所治機根發起疾前無藥機先無教故初立因緣分為欲顯示如意寶殊雖唯是一而為一切諸法根本摩訶衍法雖唯是一而為恆沙法門體性重威大龍乃所受用利根智者乃所領解故第二立立義分為欲顯示摩尼寶藏雖備無量萬寶而開千重門群立所了知大乘本法雖圓無邊千義而別釋散説鈍根所分明故第三立解釋分為欲顯示雖眼耳中見聞寶雨之妙術思心中解知無盡之圓德而出現舌威不競入門開通法向不近隔檀得如意寶藏無由蹬臺宮雖口語中誦持教義之尊辭思心中觀察廣略之深理而勸加行添於金剛不起堅固信得法界寶藏而無由契玄理故第四立修行信心分雖開廣略之法示進入之門而怯弱衆生聞廣説法門不堪進修行故鈍根衆生聞略説法門不能解故生厭離心如是衆類若值勸請緣漸漸進修備百行因至萬德果若不得勸䇿緣彌彌遠退將恆沙煩惱而及於無性馬鳴菩薩見是利故顯示利益勸請修行是故後立勸修利益分有何因緣不增不減唯立五分頌曰攝彼大總持五十法門故是故不增減唯建立五分論曰馬鳴菩薩十萬嗢吒喃大總持論中總立五十門判釋諸教理今此論中立五分法門各攝彼十門是故不增減唯立五分所謂彼論建立所化圓滿等十門因緣分所攝百六十摩訶衍等十門立義分所攝安立隨順決擇等十門解釋分所攝修集決擇趣入等十門修行信心分所攝勸請呵嘖引導等十門勸修利益分所攝已説建立門次説唱章判説門本曰初説因緣分問曰有何因緣而造此論答曰此因緣有八種論曰初一因緣分次二解釋分作正因緣次四為修行信心分作正因緣後一為勸修利益分作正因緣初一因緣中即有四門一能化教法出興門二所化衆生分際門三出興作業善巧門四除遣諍論誹謗門後七因緣中各具三門謂前三門中今當舉相隨次別釋本曰云何為八一者因緣總相所謂為令衆生離一切苦得究竟樂宣説開示妙法之要非求世間名利恭敬故論曰因緣總攝者總舉能化教法出興門所謂為八種根本總體作正因緣故言因緣總為二十四種分離別相作正因緣相三十二種總別法相立義分中自當顯説為令衆生者總舉所化衆生分際門謂攝邪定聚一切衆生不定聚三十種衆生正定聚一百二十種衆生離一切苦得究竟樂者總舉出興作業善巧門謂緣三聚而為境界宣説開示妙法要者欲令一切無量衆生遠離生滅無常之苦獲得根本總攝之樂故非求世間名利恭敬故者總舉除遣諍論誹謗門謂愚衆生作如是疑馬鳴菩薩居位不動未及法雲而緣上地諸菩薩等為其所化之境界者唯顯自殊勝為求名利等有其虗言無有實義豈下地菩薩應得教化上地菩薩是故馬鳴為遣如是不信疑故自通而言我久遠劫成正覺訖而助教化利益群生為滿本願故權示藍修位非謂欲求名利等故作如是説本曰二者為欲解釋如來根本之義令諸衆生正解不謬故論曰言解釋如來根本之義者總舉能化教法出興門謂是因緣能為顯示正義對治邪執作正因緣故言如來根本之義所以者何十方三世一切如來無有一佛不為根本二心二門七種對治成正覺故令諸衆生者總舉所化衆生分際門謂攝邪定聚一切衆生故正解不謬故者總舉出興作業善巧門謂緣邪定聚狂亂衆生而為境界宣説開演顯示正義對治邪執甚深法者恆沙之謬解摧塵數之逆亂見斷除其闡提不信障而為令趣入于十信大道故本曰三者為令善根成就衆生於摩訶衍法堪任不退信心故論曰此為分別發趣道相作正因緣是名為能化教法出興門謂三種發心善根成就衆生者總舉所化衆生分際門謂攝上品十信三賢十地各有三種品諸衆生故於摩訶衍法堪任不退信心故者總舉出興作業善巧門謂緣二聚衆生而為境界宣説開示三發心者為令超過自分獲得勝進故本曰四者為令善根微少衆生修習信心故論曰此因緣為修行信心分四種信心四種修行作正因緣是名為能化教法出興門善根微少衆生者總舉所化衆生分際門謂攝得十信位前五心中品衆生故已得前五故非都無善根名言微少未得後五故不能具足不名成就修習信心故者總舉出興作業善巧門為令成就後五信心故本曰五者為示方便消惡業障善護其心遠離癡慢出邪綱故論曰此因緣為修行信心分精進之終復次若人雖修行信心乃至得免諸障善根增長作正因緣是名為能化教法出興門此中衆生攝得十信位初心下品衆生故是名為所化衆生分際門消惡業障等者總舉出興作業善巧門謂示禮拜懺悔等方便而為消除種種業障海故本曰六者為示修習止觀對治凡夫二乘心過故論曰言修習止觀者總舉能化教法出興門謂為修行信心分修止觀門作因緣故凡夫二乘者總舉所化衆生分際門謂攝得十信位前二心下品衆生邪定聚攝一切二乘故對治心過者總舉出興作業善巧門謂以兩輪通為對治凡夫二乘見執過失故本曰七者為示專念方便生於佛前必定不退信心故論曰此因緣修行信心分之終復次衆生初學是法乃至畢竟得生住正定聚文作正因緣是名為能化教法出興門此中衆生攝得十信位前四心更不能勝進下品衆生謂住是世界信心成就極怖畏故是名為所化衆生分際門必定不退信心故者總舉出興作業善巧門謂勝緣力而為安立正定聚故本曰八者為示利益勸修行故論曰此因緣為勸修利益分作正因緣是故名為能化教法出興門此中衆生攝十億八萬六千種邪定聚諸衆生故是名為所化衆生分際門為示利益勸修行故者總舉出興作業善巧門謂為欲令宣説功德增長欲樂顯示過患覺悟厭離故本曰如是等因緣所以造論論曰此結也問一切諸教法皆盡於立義分一切諸所化之機皆盡於初因緣分何故開三分而別釋立七因緣而散説耶為欲顯示利鈍廣略總別不同故何故二乘人重取于四處為欲顯示二乘衆生下劣狹少發菩提心向無上道甚極切難超過於餘類衆生故何故所餘邪定衆生唯取于三處為欲顯示衆生形於二乘輕其過失故何故不定人別取三品耶為欲顯示不定衆生輕其過失故有何因緣不增不減唯立八種何次第如是頌曰總攝大總地八十因緣故修行轉勝法次第如是故論曰馬鳴菩薩十萬嗢吒喃總地論中總立八十因緣以為論緣由今此論中八種因緣各攝彼論十種因緣故不增不減唯立八種由是義故言如是等等字總攝彼八十故因緣次第行法法爾故謂除闡提不信障得十信心除著我障得十住心除畏苦障得十行心除捨離障得十向心斷異生性等十種障證歡喜等十種地故本曰問曰修多羅中具有此法何須重説論曰此説四種根即有二門一所説無異難問門二舉時分位決疑門此即初也謂光明大覺等一百契經中開示一切無量法藏隨機根量攝取利益無所闕失中士何用繁造此論重傳彼法更無加顯力而今造此論重説彼法者頗不求稱讚等事耶畢竟説不盡其理耶本曰答曰修多羅中雖有此法以衆生根行不等受解緣別論曰此總舉決疑門所謂馬鳴自通而言三世諸佛一切教理自然常住一味平等無有移轉無有起滅是故雖題榜差別翰牘不同而其教法唯是一味唯是平等或不分或不別然而衆生根性差別利鈍不等心行差別廣略不同既所化之機異能化之人不能自同令受教法名字差別令解文義因緣各別謂或有衆生依佛伽陀修梨毗羅而得解者或有衆生依菩薩遮陀尸修梨毗羅方得解者故為是人當須造論本曰所謂如來在世衆生利根能説之人色心業勝圓音一演異類等解則不須論論曰復次如來在世時所化清淨能化圓滿八萬四千種色四種心遍智十種作業十種殊勝六十八梵圓八十八妙音無有前後一時敷演無量無邊種種異類或有衆生見佛妙色而得解者或有衆生思惟佛心而得解者或有衆生觀察如來十業十勝而得解者或有衆生聽聞佛梵圓妙音而得解者如是平等明了通達則不須論本曰若如來滅後或有衆生能以自力廣聞而取解者或有衆生亦以自力少聞而多解者或有衆生無自心力因於廣論而得解者亦有衆生復次廣論文多為煩心樂總持少文而攝多義能取解者論曰若佛滅後所化雜亂能化少闕經論機異廣略根別根謂四種根機謂三乘機云何為四一廣自力根二略自力根三廣無力依他根四略無力依他根如是四種根性中初二是修多羅衆後二是憂波薩提那衆本曰如是此論為欲總攝如來廣大深法無邊義故應説此論論曰如是第四人須造此論也何故因緣門中所化圓滿根性門中所化微少為欲顯示清淨僧那阿世耶無有邊際故為欲顯示受教實行衆生之類有其分際故以何因緣出興兩重廣略教法其相云何頌曰本願繫屬故出興此法門楞伽王契經分明顯説故論曰由繫屬因緣之力出興兩重甚深法門所以者何於契經中明顯説故所謂楞伽王契經説爾時世尊告文殊師利言我念過去無量劫海於五百世忍辱仙人在山林中專心修行少欲知足四聖衆種種清淨之法于時有一大蛇從山頂下來詣我所聞我所誦則投其體禮拜懺悔投身已訖以頭潛地區區作文而説偈言我過去世忍辱仙人住於此山六時行道而一時瞋因緣力故今得蛇身常受大苦若命終後得人同分我當弟子隨汝修行汝所讀誦常我所誦是故我今發大慚愧説是偈已則便命終後得人身則我弟子爾時互相發願繫屬謂作如是願我若證無上道宣説九十洛叉廣説修多羅利益意樂廣大衆生宣説十落叉略説修多羅利益意樂總持衆生則我弟子作如是願我當師徒造作九十部略説憂婆薩提那利益意樂總持衆生以此因緣我今説偈契經海以此因緣故我滅度後我弟子現作論教本曰已説因緣分次説立義分論曰立義分中法門名字其數相云何頌曰有三十三種十六所入法十六能入門及不二別故論曰立義分中法門名數總有三十三種差別所謂十六所入本法十六能入門及不二摩訶衍故何故摩訶衍成十六種根本摩訶衍中開八種故一心法界三大義中各開二種故何故能入門成十六種一心法界及三大各二種故或各開二種門故是名為本數本曰摩訶衍者總説有二種云何為二一者法二者義論曰此文中有三門一所入根本總體門二能依趣入別相門三通達軌則不動門初二種門有其兩重住思應觀摩訶衍者即是所入根本總體門即是根本摩訶衍中有八差別云何為八一體一心摩訶衍二三自一心摩訶衍三無量無邊諸法差別不增不減體大摩訶衍四寂靜無雜一味平等不增不減體大摩訶衍五如來藏相大摩訶衍六具足性功德摩訶衍八能生一切出世間善因果用大摩訶衍如是八種摩訶衍法皆從能入建立其名謂以一體一心而為其門所趣入故名為一體一心摩訶衍乃至以能生一切出世間善因果用大摩訶衍而為其門所趣入故名為能生一切出世間善因果用大摩訶衍譬如轉輪王謂如輪王隨其輪相建立名字摩訶衍法亦復如是隨其門相建立名字故大覺契經説佛告文殊師利諦聽諦聽善思念之我當為汝分別開説八種身法何等為八一者一體趣入身法二者三自趣入身法三諸法差別不增不減體大趣入身法四純淨一相寂靜無雜不增不減體大趣入身法五如來藏功德顯了大趣入身法六圓滿性功德顯了大趣入身法七出世間因果自在無礙大趣入身法八出生出世間妙因果自在無礙大趣入身法乃至廣説馬鳴菩薩正攝彼文是故説言摩訶衍者總言此中總言於兩處中是總體故所謂望上及下臨故大總地論中開八十門廣釋根本摩訶衍法今各攝十成一種故唯立八法由何義故有八應知能入別相有八種故所入總體有八應知能入所入八種法相勝劣廣狹其相云何頌曰平等平等一皆無有差別各攝諸法故然終不雜亂論曰如是能所十六法相遍滿遍滿平等平等一味一相皆無差別所以者何各攝諸法畢竟盡故若爾本末及與總別皆悉渾洞雜亂耶終其本末不相雜亂其總別門初後非無然各各別別皆悉等量故曰平等非謂一法故稱平等本曰所言法者謂衆生心論曰第二重四種法中各具三門一本法所依決定門二根本攝末分際門三建立二種摩訶衍門此即初門今當須嗢吒喃頌總持顯説其相云何頌曰衆謂四行衆生謂四種生是一法界藏遍於彼八處論曰衆有四種一者如來衆二者一切菩薩衆三一切聲聞衆四一切緣覺衆生有四種一卵生二胎生三濕生四化生過數故衆受生故生是一法界心彼八處中周遍圓滿不可分折不可離散唯是一體唯是一相以四種衆攝諸聖盡以四種生攝諸凡盡馬鳴論師為顯一心廣大圓滿名為衆生順理契經云爾時世尊放大光明顯神力已告佛子言諦聽諦聽善思念之我當為汝分別解説一法界藏善男子一法界藏者所謂遍於諸如來衆諸菩薩衆諸聲聞衆諸緣覺衆及諸異生無所不通無所不至無所不當是故名為一法界藏今攝此文故名衆生馬鳴菩薩六萬嗢吒喃本藏論中開十種門別釋散説今略攝故唯言衆生本曰是心即攝一切世間出世間法論曰此是根本攝末分際門其相云何頌曰是一法界心總攝二種門名攝世出世作法界名法論曰一法界心總攝一切生滅門法是故名為攝世間法總攝一切真如門法是故名攝出世間法皆作法界故為名法自體契經云廣大神王即攝一切種種無明一切種種染法一切種種淨白品法又攝一切清淨法一切無礙法一切解脫法一切絶離法一切滿足法一切寂靜法而廣大神王非世間法非出世間法今攝此文故名為攝馬鳴菩薩八萬嗢吒喃歸宗論中開二十門分明顯説此中略故如是而已本曰依於此心顯示摩訶衍義何以故是心真如相即示摩訶衍體故是心生滅因緣相能示摩訶衍自體相用故論曰此即建立二種摩訶衍門其相云何頌曰總標二種門言依於此心總標二本法顯示摩訶衍論曰總標能入二種門故言依於此心總標所入二種法故言顯示摩訶衍義云何為二門一心真如門二心生滅門云何為二法一一體摩訶衍二自體自相自用摩訶衍如是所入二種本法或從能入建立其名所謂以真如體而為其門所趣入故名言為體以自相大覺心而為其門所趣故名言為自由能入門二種別故所入本法有二應知何以故者即請問辭謂由何義依於此心句中具二種門顯示摩訶衍義句中具二種本法者焉答曰作一法界心真如門即顯示體摩訶衍法作一法界心生滅門能示自體自相自用摩訶衍法由此義故當知各具二門二法大覺契經云復以文殊師利有二種法甚微深妙不可思議何等為二一者體相平等摩訶衍二者自相自體摩訶衍若欲證得是二種法當行二門何等為二一者無斷無縛門二者有斷有縛門乃至廣説今攝此文作如是説大總持中開八種門分明散説本曰所言義者則有三種云何為三一者體大謂一切法真如平等不增減故二者相大謂如來藏具足無量性功德故三者用大謂能生一切世間出世間善因果故論曰三大義中各略初二門立後一門馬鳴菩薩本趣意樂後攝初中故如是而為復次比來次第分明顯了故已上二頌本應流至于此一者體大者總標所入二種本法一無量無邊諸法差別不增不減摩訶衍謂一切法真如平等不增不減故者總標能入二種別門所謂如本法名門亦爾故二者相大者總標所入二種本法一如來藏功德摩訶衍二具足性功德摩訶衍謂如來藏具足無量性功德故者總標二種能入別門所謂如本法名門亦爾故三者用大者總標所入二種本法一能生一切世間因果摩訶衍二能生一切出世門善因果摩訶衍能生一切世間出世間善因果故者總標能入二種別門所謂如本法名門亦爾故三種大義別別分釋如總地論本地品中分明顯説何故不二摩訶衍法無因緣耶是法極妙甚深獨尊離機根故何故離機無機根故何須建立非建立故是摩訶衍法諸佛所得耶能得於諸佛諸佛得不故菩薩二乘一切異生亦復如是性德圓滿海是焉所以者何離機根故離教説故八種本法從因緣起應於機故順於説故何故應機有機根故如是八種法諸佛所得耶諸佛所得得於諸佛不故菩薩二乘一切異生亦復如是修行種因海是焉所以者何有機根故有教説故何故依真如門所趣入摩訶衍法唯立體名依生滅門所趣入之摩訶衍法立自名耶真如門中無他相故生滅門中有他相故他謂一切不善品法自謂一切清淨品法若所對治他無能對治自無故唯言體不説自焉若所對治他有能對自有故名言自不唯體焉復次為欲顯示一法界體平等平等無有其私無量性德自然本有非得他力故復次隨宜安立無有定故何故別説門中一心別為一三大總為一而等同各詮二摩訶衍三大義合方應得詮二摩訶衍大義之名通於三種故總為一義無別意趣今所開示十六法門勝劣廣狹其相云何頌曰平等平等一皆無有別異各攝諸法故然終不雜亂論曰能入所入十六法門圓滿圓滿平等平等周遍法界無有差別各攝諸法畢竟盡故然終不雜本末能所已説總別二門本曰一切諸佛本所乘故一切菩薩皆來此法到如來地故論曰此即通達軌則不動門謂微塵數十方三世一切諸佛皆悉乘此三十二種甚深安車達於清淨無上地故十方三世一切菩薩亦復如是此中菩薩言通取三聚一切衆生而不通達如來地故本曰已説立義分次説解釋分論曰解釋分中法門名字其數幾有其相云何頌曰唯有四種法餘二十九門略不解釋者九論已説故論曰解釋分中唯釋四法所餘法門略不別釋云何為四一者一體摩訶衍二三自摩訶衍三真如門四生滅門何故餘法略不解釋一心遍滿等九論中已解釋故所謂一心遍滿論中唯釋四法所餘法門略不別釋一者一體一心摩訶衍二三自一心摩訶衍三一體一心門四三自一心門融俗歸真論中唯釋四法所餘法門略不別釋一無量無邊諸法差別不增不減體大摩訶衍二寂靜無雜一味平等不增不減體大摩訶衍三諸法差別不增不減體大門四一味平等不增不減體大門法界中藏論中唯釋四法所餘法門略不別釋一切如來藏功德相大摩訶衍二具足性功德相大摩訶衍三如來藏功德相大門四具足性功德相大門祕密微妙論中唯釋四法所餘法門略不別釋一能生一切世間因果用大摩訶衍二能生一切出世間善因果用大摩訶衍三世間因果用大門四出世間善因果用大門衆命合一論中唯釋四法所餘法門略不別釋一無量無邊諸法差別不增不減摩訶衍二寂靜無雜一味平等不增不減摩訶衍三諸法差別不增不減門四一味平等不增不減門真如三昧論中唯釋四法所餘法門略不別釋一如來藏功德摩訶衍二具足性功德摩訶衍三如來藏功德門四具足性功德門心性清淨論中唯釋四法所餘法門略不別釋一能生一切世間因果摩訶衍二能生一切出世間善因果摩訶衍三世間因果門四出世間善因果門不動本原甚深玄理二種論中唯釋一法所餘法門略不別釋所謂不二摩訶衍法廣説略説各差別故諸論建立門中備標本數散説門中各闕其數為欲顯示法體不分義門得差別故復次為欲令使學者增長思惟力故復次為欲顯開示教理甚深極玄出生尊重讚歎心故復次為欲顯示廣大如虗空界義理無窮如澄神海言説不能具談思惟不知其量故本曰解釋有三種云何為三一者顯示正義二者對治邪執三者分別發趣道相論曰如是三門解釋四法大門數量本曰顯示正義者依一心法有二種門云何為二一者心真如門二者心生滅門論曰即是略説此有三門一建立四種法相門二法門該攝圓滿門三發起問答顯因門此即初門二法二門名字差別其數幾有其相云何頌曰各有十種名契經異説故而無有別體隨能立名故論曰二法二門各有十名諸契經中別別説故而其法體無有差別隨彼功能立其名故二種本法各有十名名通義別一名為廣大神王此中有二一鳩那耶神王住金剛山一向出生吉祥神衆二遮毗佉羅神王住大海中遍通出生一切種種吉祥神衆過患神衆二種本法廣大神王亦復如是一體本法一向出生真如淨法三自本法遍通出生一切種種淨白品法染汙品法故自體契經曰文殊師利前白佛言世尊甚深極妙二種大乘不覺同異極疑衆心如宜世尊為衆更説佛造作相而告文殊言善男子如是二法譬如金剛神王及主海神王其相各差別謂如金剛神王住金剛山見諸境界唯現金光不現餘光真如一心金剛神王亦復如是唯有淨法無有餘法故又如金剛神王唯出清淨眷屬當不出生雜亂眷屬真如一心亦復如是唯出生無垢清淨法故復次譬如主海神王住大海中出生種種粗惡眷屬種種善妙眷屬生滅一心主海神王亦復如是出生一切染淨法故二名為大虗空王此中有二一空自在空王以空容受而為自在二色自在空王以色容受而為自在二種本法亦復如是一體空王以無住處而為自在二自空王以有住處而為自在故金剛三昧契經云心如法理自體空無如彼空王本無住處一地契經云一心法體於諸障礙無有障礙令住諸法譬如空王於一切色得自在故容受大種故三名出生龍王此中有二一出生光明龍王以淨光明而為依止二出生風水龍王以風水德而為依止二種本法出生龍王亦復如是一體本法以純淨法而為其體三自本法以染淨法而為其德故順理契經云一心本法純一無雜譬如光明龍王以淨光明而為宮殿以淨光明而為相身以淨光明而為徒衆無始契經云譬如大海龍王名曰出生風水從其頭頂出生澄水從其尾末出生標嵐由是龍故大海風水常恆相續無有斷絶一心龍王亦復如是能生一切差別平等種種諸法常恆相續無有斷絶故四者名為如意珠藏此中有二一金主如意唯出生金剛二滿足如意具足出生善不善物二種本法亦復如是一體如意唯生淨法三自如意通生染淨故如如契經云佛告金剛藏言佛子譬如金翅鳥王命終然後其心入海為如意珠能生金沙利益龍王一心本法亦復如是能生真理圓滿者本性智契經云譬如遮多梨鬼為報恩故於一萬劫為如意珠利益海生三自本法一心如意亦復如是能生長生死及涅槃法故五為方等此中有二一白毫方等唯現天像二亂色方等通現五種如是二毫衆生身分顯了分明譬如明鏡二種本法亦復如是故攝無量契經云清淨法界如白苾薩伊尼羅無盡法界如亂苾薩伊尼羅故六名為如來藏此中有二一遠轉遠縛如來藏二與行與相如來藏實際契經云佛子如來藏者唯有覺者唯有如如離流轉因離慮知縛一一白白是故名為如來之藏楞伽契經云如來藏者為善不善因受苦樂與因俱若生若滅猶如妓兒故七名為一法界此中有二一鈍白一法界如空劫時二無盡一法界如住劫時真法界契經云空種無礙如空長時遍種無礙如有長時故八名為摩訶衍義如前説九名為中實此中有二一等住中實如獨明珠二別住中實如順明珠中實契經云離邊真心若真如依如異同珠若生滅依如同異珠故十名為一心此中有二一者是一是一一心隨所作立名二是一切是一切一心隨能作立名一心法契經云爾時舍利弗前白佛言世尊本地修多羅中作如是唱其心體性非大非小非法非非法非同非異非一非一切何因緣故今日自言真如一心依一故一生滅一心因多故一將非世尊無有前後相違過耶佛言善男子莫作如是説所以者何心法非一因所作一故假名為一心法非一切因所作一切故假名為一切而言一心不説一切心者隨能作心立其名故乃至廣説如是十名總攝諸佛一切法藏根本名字已説二法十種別名次説二門名字差別且心真如有十種一名為如來藏門無雜亂故二名為不二平等門無差別故三名為一道清淨門無異岐故四名為不起不動門離作業故五名為無斷無縛門無治障故六名為無去無來門無上下故七名為出世間門無四相故八名為寂滅寂靜門無往向故九名為大總相門無別相故十名為真如門無虗偽故如是十名總攝諸佛一切法藏平等義理法門名字次心生滅門有十種名一名為藏識門攝持一切染淨法故二名為如來藏門覆藏如來法身體故三名為起動門相續作業故四名為有斷有縛門有持障故五名為有去有來門有上下故六名為多相分異門染淨之法過恆沙故七名為世間門四相俱轉故八名為流轉還滅門具足生死及涅槃故九名為相待俱成門無自成法故十名為生滅門表無常相故如是十名總攝諸佛一切法藏種種差別法門名字已説二門十種別名次説同異分相門二種本法同異差別其相云何頌曰有三異二同各依門境別各遍名同故同名異義故論曰二種本法有三異二同云何為三異一依異各有所依摩訶衍故二門異各其能入門差別故三境異各緣自依為境界故云何為二同一遍同周遍法界等其量故二名同十種名字通二法故何故如是同名異義故二種法門同異差別其相云何頌曰有七異一同人法依行體境界位別故異名異義故論曰是二種明有七異一同云何為七異一人衆異真如門唯有清淨解脫者故生滅門中備有三聚諸衆生故二法門異真如門中唯有一向淨白品法故生滅門中備有一切染淨法故三所依異各有所依摩訶衍故四行法異真如門中一心一念生縛不生以為其行故生滅門中以生滅生以滅滅滅以為其行故五體相異心真如門與其本等故心生滅門與其本別故楞伽契經云寂滅者名為一心一心者名如來藏故六境界異各緣自依為境界故七位地異真如門中相雜住故生滅門中往向住故云何為一同所謂遍同故何故如是異名異義故二門位地何等契經分明顯説各有幾位頌曰楞伽等契經真如有一種生滅門有二唯亂上下故論曰二門位地楞伽等契經中明了顯説故謂大本楞伽契經説回向即信心信心即佛地佛地即十地十地即發心分流楞伽契經説十地為初地初地為八地九地為七地七地為八地二地為三地四地為五地三地為六地寂滅有何次真修契經云一歲母一時生五十歲兒彼五十歲兒懷任一歲母生五十一歲大丈夫男子或豈如是有或豈如是無如是等諸經依心真如何建立其位地於真如門唯有一向雜亂住位無有餘位是故頌言唯亂餘契經中次第往向種種位地依生滅門中而所安立應審觀察依生滅門有二種位一向上門二向下門如是兩門生滅決擇自當顯説心生滅門正智所證性真如理何門所攝生滅門所攝非真如門分界別故二門真如復有何別真如門理理自理故生滅門理智自理故二門位地以何義故其理各別無障有障故舉是一隅隨應應觀本曰是二種門皆各總攝一切法論曰即是法門該攝圓滿門謂以真如門攝一切法無一一法而非真如故以生滅門攝一切法無一一法而非生滅故然真如門不能攝生滅門一切諸法又生滅門不能攝真如門一切諸法而言總攝一切法者總攝生滅一切法故總攝真如一切法故所以者何二門皆悉平等各各別故本曰此義云何以是二門不相離故論曰即是發起問答顯因門謂直表問故直説答故本曰心真如者即是一法界大總相法門體論曰此即廣説分此真如門中有三門一根本體性真如門二發起問答決疑門三假説開相真如門第一門中即有三門一建立名字門二直詮真體門三解釋名字門此即初門謂隨功能立其名故一心真如各有十名何故除餘唯立是名作業當故所餘衆名必非如是故略不立此義云何心一作大業法作總業界作相業故法之門門則是體是故説言法門體種種別相卛向應審本曰所謂心性不生不滅論曰此直詮真如門而簡生滅門謂真如法非生非滅無生無滅非住非異無住無異非如生滅之法是生是滅有生有滅是住是異有住有異故以相有無為差別故復次非是言不非謂是非故言不焉所以者何其真如法百非非非千是非是非非非是於非二亦不住故本曰一切諸法唯依妄念而有差別論曰且假彼有顯此是無謂假生滅門之假有示真如門之實無故本曰若離心念則無一切境界之相論曰若離諸戲論之識無有一切妄境界故本曰是故一切法從本已來離言説相離名字相離心緣相論曰直顯示真如法離絶之相故言説名字心量各有幾數其相云何頌曰言説有五種名字有二種心量有十種契經異説故論曰言説有五一相言説二夢言説三妄執言説四無始言説五如義言説楞伽契經云大慧相言説者所謂執著色等諸相而生大慧夢言説者念本受用虗妄境界夢覺已知依虗妄境界不實而生大慧執著言説者念本所聞作業而生大慧無始言説者從無始來執著戲論煩惱種子熏習而生三昧契經云舍利弗言一切萬法皆悉言文言文之相即非為義如實之義不可言説今者如來云何説法佛言我説法者以汝衆生在生説故説不可説是故説之我所説者義語非文衆生説者文語非義非義語者皆悉空無空無之言無言於義不言義者皆是妄語如義語者實空不空空實不實離於二相中間不中不中之法離於三相不見處所如如如説故如是五中前四言説虗妄説故不能談真後一言説如實説故得談真理馬鳴菩薩據前四故作如是説離言説相名有二種一字字名二字影名楞伽契經云大慧復次名身者所謂諸字從名差別從阿字乃至呵字名為名身道品契經説鏡中共説名為影名故字有二種一依聲字二依空字楞伽契經説大慧復次字身者謂聲長短音韻高下名為字身大海契經説佛告文殊師利言汝所前問云何名為虗空輪字者譬如虗空中飛鳥喻明曜時出十種和聲虗空輪字應如是觀故如是二中各初一種不能詮表甚深真理各後一種得詮真理今據前門作如是説離名字相心量有十所謂眼等八識為八心量九多一識心十一一識心如是十中初九種心不緣真理後一種心得緣真理而為境界今據前九作如是説離心緣相本有契經云甚深真體非餘境界唯自所依緣為境界故本曰畢竟平等無有變異不可破壞唯是一心故名真如論曰此顯示三離之功德故謂一切差別以四種妄言説而為根本而轉故一切外道九種變論十種異執唯以名字為本而轉一切煩惱破障一切所知壞障唯以心品而轉故唯是一心故名真如者總結其體真如本曰以一切言説假名無實但隨妄念不可得故論曰此顯示三離之因緣故謂以一切言説無實一切假名無實一切心識但隨妄念不可得故不可言説真實理中示離三相故虗假之相如實之法極相違故本曰言真如者亦無有相論曰此第二傳言遣執著之過謂愚衆生作如是執遠離三相圓滿三德體真如理雖無假相而有實相自然常住決定實有由如是計墮於常邊無出離時是故為遣如是見故云言真如者亦無有相本曰謂言説之極因言遣言論曰此直示真如無相之因緣謂諸言説極於真如更無超過既絶言説豈得有相無言故得因言遣言而已於是能遣如如如説四種虗妄言説大本維摩經説爾時文殊師利菩薩摩訶薩語鳩那阿筏陀多言我等諸大衆皆悉各各隨所自樂宣説八十一種向不二門如宜維摩詰為我等大衆離言説言説説非不二不二除遣假説之垢於是維摩詰默然無所説爾時文殊師利讚維摩詰言善哉善哉乃真實不二法門斯乃真實不二法體故本曰此真如體無有可遣以一切法悉皆真如故亦無可立以一切法皆同如故論曰此解釋名字門初約真釋名次約如釋名此文明何義所謂顯示無有斷證智故此義云何謂斷道起滅必因治障不能自起而真體中無有染法而可除遣故無有能治之斷道所以者何以無有一一法而非真體故復次若有障智隨心高下應可建立一切位地而如體中無有分位而可建立故無有能立之方便所以者何以無有一一法而非如體故本曰當知一切法不可説不可念故名為真如論曰此總結上所説故已説根本體性真如門建久九年六月朔日於石山寺以高隆寺本比交了付異本畢
