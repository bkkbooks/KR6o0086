body:
  text: 本曰已説解釋分次説修行信心分論曰就此分中即有七門一能治所治契當門二信心品類分剖門三修行方便善巧門四廣釋魔事對治門五讚歎三昧功德門六兩輪具闕益損門七勸劣向勝不退門也本曰是中依未入正定衆生故説修行信心分論曰此能治所治契當門是中依未入正定聚衆生者即是所治所謂所化之境界故説修行信心分者即是能治所謂能化之教法故所化境界其量云何所謂攝二聚之衆生故一邪定聚二不定聚所以者何此二衆生皆悉未入正定聚故言契當者謂二衆生中各契教説故其相云何謂欲被邪定聚衆生故説信心門欲被不定聚衆生故説修行門所以者何進入次第其法爾故謂未信人先起信故其已信人直修行故復次通利益故本曰何等信心云何修行論曰此信心品類分剖門此中有二一直問信修品類門二別答顯示信心門此是初也本曰略説信心有四種云何為四論曰此第二門中即有二門一總答總問門二廣答門此初也本曰一者信根本所謂樂念真如法故二者信佛有無量功德常念親近供養恭敬發起善根願求一切智故三者信法有大利益常念修行諸波羅蜜故四者信僧能正修行自利利他常樂親近諸菩薩衆求學如實行故論曰此第二門中故有四種一信本令心平等門所謂樂信為自根本真如理法由無明力種種差別一切諸心皆悉會一令平等故二信佛欣有功德門所謂樂信無上大覺如來世尊欣求所有無量無邊一切德故三信法精進修行門所謂樂信三世諸佛為自恩父為自恩母為自恩師不能改壞不能生滅虗空金剛不動軌則有不可思議中不可思議殊勝利益常恆轉轉於一切時於一切處修行一切助道品故四信僧令心無諍門所謂樂信一切無量菩薩僧衆以兩勝行為自內德若遠若近隨自聞時隨自見時隨自思時往詣僧所至心聽受種種深經種種深論種種深理種種妙事不斷絶故本曰修行有五門能成此信論曰此下説修行方便善巧門此中有四一總標答前所問門二總問略答問數門三略問廣答散説門四讚歎三昧殊勝門此即初門也本曰云何為五一者施門二者戒門三者忍門四者進門五者止觀門論曰云何為五者即是通達所説門也一者施門等者即略答建立問數門所謂建立大門數故何故次第如是謂修行者六度次第法如是故次就略問廣答散説門中有五門應審觀察此五種中各各具二門一略問門二廣答門如其次第不亂數量應審思擇本曰云何修行施門若見一切來求索者所有財物隨力施與以自捨慳貪令彼歡喜論曰云何修行施門者即是略問所謂開問故後後諸門應如是知就廣答門中即有三種施一財物施謂若有衆生來到我所乞我所有即便不疑隨時隨處皆悉施與無所顧惜故何等物名為財物耶有幾種物所謂有二種財物故一內物二外物就內物中亦有二種一無色即是心識二有色即是諸根若有衆生來到我所乞我心識即便不惜隨時施與令彼歡喜若有衆生來到我所隨其所用乞我一一有色妙根即便不惜隨時施與令彼歡喜於外物中亦有二種一有識即是妻子奴婢等類二無識即是宮殿舍宅衣服嚴具等類若有衆生來到我所乞此等物即便不惜隨時施與令彼歡喜本曰若見危難恐怖危逼隨己堪任施與無畏論曰此第二隨應施所謂或有衆生五根壞失不能具足或有衆生病苦無量不得安穩或有衆生其心愚癡不能明了行者爾時以賢士則隨其所應隨其所當隨其所宜隨其所用能善簡擇能善分別除彼苦惱令歡喜故本曰若有衆生來求法者隨己能解方便為説不應貪求名利恭敬唯念自利利他回向菩提故論曰此第三教法施謂有衆生若時不時若親不親若貴不貴若愚不愚若夫不夫若女不女若善不善若惡不惡若人非人如是等類來到我所欲求法時即便不惜發起無量無邊廣大圓滿大慈悲心決斷彼疑分除煩惱徐增智慧攝取彼人不墮惡道令到無上大菩提故本曰云何修行戒門所謂不殺不盜不淫不兩舌不惡口不妄言不綺語遠離貪嫉欺詐諂曲瞋恚邪見論曰此説修行戒門此門有四此即第一建立戒相標宗門所謂建立十種清淨防轉戒故本曰若出家者為折伏煩惱故亦應遠離憒閙常處寂靜論曰此第二成就戒品勝處門所謂若為具足戒品常當遠離散亂雜處常當親近寂靜勝處安住其中不捨離故本曰修習少欲知足頭陀等行乃至小罪心生怖畏慚愧改悔不得輕於如來所制禁戒論曰此第三具足戒行不輕門所謂修行種種妙行起深信心不得輕賤如來所制師母戒故本曰當護譏嫌不令衆生妄起過罪故論曰此第四守護不令誹謗門所謂護持佛眼精戒終不破失具足自利種種放逸譏嫌衆生不令發起妄想過罪具足利他圓滿莊嚴大覺海故本曰云何修行忍門所謂應忍他人之惱心不壞報亦當忍於利衰毀譽稱譏苦樂等法故論曰此説修行忍門此門有二一顯示略忍伏我門所謂若有衆生造作惡阿世耶之境令惱我心行者爾時其心能忍不動惱故如本應忍他人之惱心不壞報二顯示廣忍無我門所謂或有衆生以飲食衣服等種種財物施與我所利益歡樂或有衆生以劒杖等種種怖相來到我所損滅我依正念不得自在或有衆生以粗惡誹謗等種種穢語若遠若近毀嫌於我或有衆生以正住等種種德讚歎我身於如是等種種事中其心平等堅固不動如須彌故如本亦當忍於利衰等故本曰云何修行進門所謂於諸善事心不懈退立志堅強遠離怯弱論曰此説修行進門此門有二一通示修行精進門二別釋修行精進門此即初門所謂於諸種種妙事其心轉勝勤欲精進終不息故本曰當念過去久遠已來虗受一切身心大苦無有利益是故應勤修諸功德自利利他速離衆苦論曰第二別釋修行精進門中故有二門一無障修行精進門二有障修行精進門此即初門所謂行者作如是念我從無始過去時來唯受虗妄不實身心都不能受金剛不壞之身心者無餘因緣唯妙行中不勤行故我若懈怠如前不行向未來去亦復受都無利益虗妄身心無出離期我自身尚不得出離都失自利何況救濟所餘種種有苦衆生具足利他作是念已即便發起大精進心修行行因之海莊嚴滿德之果建立兩利無闕漏故本曰復次若人雖修行信心以從先世已來多有重罪惡業障故為魔邪諸鬼之所惱亂或為世間事務種種牽纏或為病苦所惱有如是等衆多障礙是故應當勇猛精勤晝夜六時禮拜諸佛誠心懺悔勸請隨喜回向菩提常不休廢得免諸障善根增長故論曰此第二有障修行精進門所謂若有衆生有無始過去餘業障故為魔外道及惡鬼神之所惱亂不能修行或有衆生為現在世種種事務之所牽纏不能修行或有衆生為一切病苦之所逼惱不能修行如是等衆生雖耳聽聞軌則尊辭眼中觀見文教説相而不能勤修行生厭求心然若其心勇猛精進發種種勝妙方便存堪任心業障之海漸漸波息功德之嶽彌彌峯高八風不飄九結不縛故本曰云何修行止觀門所言止者謂止一切境界相隨順奢摩他觀義故論曰此説修行止觀門此門有四一總標總釋止輪門二總標總釋觀輪門三略釋決擇隨順門四廣釋決擇止輪門此是初門謂止慮知之心礙散亂之思安住於一中寂靜性不出於一切境界相隨順定標陀阿羅觀義故標陀云主阿羅云伴即此處中定主觀伴應審觀察本曰所言觀者謂分別因緣生滅相隨順毗婆舍那觀義故論曰此第二總標總釋觀輪門謂明簡擇因緣之道理審分別無常之形相能善通達能善遍知隨順觀標陀阿羅觀義故本曰云何隨順以此二義漸漸修習不相捨離雙現前故論曰此即第三略釋決擇隨順門謂定隨時中彼觀即順觀隨時中彼定即順具足不離轉故本曰若修止者住於靜處論曰第四廣釋決擇止輪門此有四門一成就止輪因緣門二直示修行止輪門三修行止輪得益門四簡入不入分際門就第一門中即有十五種一住處寂靜因緣謂若為修彼止輪門居山林等空間處中遠離散亂聚落處故所以者何散亂處中彼止輪門難成就故二獨一不共因緣謂若為修彼止輪門一界內中二人共住不得理故所以者何互動煩故第三言語不出因緣謂若為修彼止輪門於一切時於一切處不出言故所以者何隨其言説心識出故四坐其座中因緣謂若為修彼止輪門當具十事一足等事兩膝末中其兩母指互相契當令無差故二膝等事兩膝平攝令無差故三腰端事其腰端直無故四手纍事兩手相對右手為下左手為上左手為下右手為上經一月已互互易變不妄失故亦復其手置足根上故五頸端事其頸之質端直不動定建立故六面端事其面相貌不仰不俯令平相故七口相事其口之相不廣不狹開中間故八鼻相事出其氣息令無差違不出一故九眼相事其眼根量不上不下平等舒故十止眼事置其眼處安置大虗空字輪中恆不離故五出入時節因緣謂若為修彼止輪門唯用辰及午二時此餘時中不出入故六知識善友因緣謂若為修彼止輪門深智慧人以為友故自餘因緣恐繁不釋如是因緣雖有無量而今此摩訶衍論中唯明第一因緣不明餘者舉初攝後故如是而已如本若修止者住於靜處故本曰端坐正意論曰此直示修行止輪門中有七門此即第一存心決定門謂不生不滅真空理中其心定故本曰不依氣息不依形色不依於空不依地水火風論曰此第二不著身體門能善通達此身空無其本自性不可得故皆除亦悉除也本曰乃至不依見聞覺知一切諸想隨念論曰第三不著心識門能善通達慮知之心自性空無無所有故本曰以一切法本來無想念念不生念念不滅亦不得隨心外念境界論曰此是作其身心空無因緣本曰後以心除心論曰此第四不著不著門能遣之心亦遣除也本曰心若馳散即當攝束住於正念論曰此第五集散會一門攝散動心置一中故本曰是正念者當知唯心無外境界即復此心亦無自相念念不可得論曰此第六顯示正念門顯示諸法唯一心故本曰若從坐起去來進止所作於一切時常念方便隨順觀察論曰此第七不離恆行門如是定心於一切時於一切處常恆相續不捨離故本曰久習淳熱其心得住以心住故漸漸猛利隨順得入真如三昧深伏煩惱信心增長速成不退論曰此説修行止輪得益門所謂若有人能修此定漸漸轉轉竭煩惱海崩業障嶽入真如定達一切法到不退故本曰唯除疑惑不信誹謗重罪業障我慢懈怠如是等人所不能入論曰此簡入不入分際門此有二意一入趣意所謂或有衆生趣入深法心無所疑或有衆生聞甚深法其心決定不生不信或有衆生聞甚深法即便尊重不生誹謗或有衆生無量業障或有衆生無我慢心或有衆生無懈怠心如是六人入佛種性決定不疑是名入趣意焉二不入意所謂若有衆生此六相違永斷絶三寶之種子決定不疑是名不入意焉如本唯除疑惑等故本曰復次依是三昧故則知法界一相謂一切諸佛法身與衆生身平等無二即名一行三昧論曰此説讚歎三昧殊勝門此門有二一體大無邊殊勝門二眷屬無盡殊勝門此初門也修此三昧通達一切無量諸法同體一相無差別故本曰當知真如是三昧根本若人修行漸漸能生無量三昧論曰此眷屬無盡殊勝門所謂即是真如三昧能為一切無量無邊金剛三昧作正根本而能出生增長故本曰或有衆生無善根力論曰此廣釋魔事對治門此門有三一衆生勝劣不同門二能作障礙假人門三顯示所作業用門此即初門謂二種衆生各不同故一因緣具足衆生具足五事故二因緣闕失衆生闕四事故云何五具一信具深愛樂故二人具能守護故三法具能善通達邪正區故四時具隨應當故五性具有真性故若有衆生具此五事終無障礙云何四闕謂與彼前四相違故若有衆生雖有真性闕此四事終無離障今此文中取闕應知本曰則為諸魔外道鬼神之所惑亂論曰此説能作障事假人門作障假人雖有無量而不出四種一四種大魔二九十六種諸大外道三十種大鬼四十五種大神此之四類各有眷屬且略而已如是諸類一切皆悉礙亂正教令向非道故名邪道魔及外道名義差別出現經中分明説故且略不釋鬼及神事出現經中無分明故更造作釋綱要略説言十鬼者名字作用各云何一遮毗多提鬼或作晝境或作夜境或作日月及星宿境或作節境二伊伽羅尸鬼作種種香味種種衣具種種草木境三伊提伽帝鬼作地水火風之境界如是三鬼皆隨應變轉四婆那鍵多鬼作飛騰境五爾羅爾梨提鬼作諸根識閇開之境六班尼陀鬼作六親眷屬亦有亦無境七阿阿彌鬼作老少境八闍佉婆尼鬼作有智無智之境界九多阿多伊多鬼作無有境十塠惕鬼作蝎蠅蟻龍虎狼師子種種音聲之境界如是七鬼皆隨應無礙如是諸用各因三事而得成就一師二教三習師謂教人教謂所學習謂宿熏如是十鬼恆一切時不相捨離俱行俱轉作障礙事用之名字從增建立次十五神者名字作用各云何一筏羅羅鍵多提神作聰明境二阿只陀彌梨尼神作暗鈍境三補多帝陀訶訶婆神作樂有光明之境界四闍毗摩只尼神作樂空光明之境界五那多婆奢神作浮散境六多多地地神作專注境七阿里摩羅神作惡空善有之境界八尸叉尼帝婆竭那神作一切覺者之境界九班彌陀羅塢多提神作我覺他惑之境界十唵唵吟吟神作具不修行之境界十一阿阿訶帝神作無無境十二修梨彌尼神作速進退之境界十三頭頭牛頭神作移轉境十四婆鳩神作堅固境十五精媚神作應時境如是十五大神王者恆一切時不相捨離俱行俱轉而作礙事惱亂行者魔及外道云何差別所言魔者令作惡事言外道者令捨善事也鬼并及神云何差別障身為鬼障心為神也如是四障當云何治此中對治即有四種一隨順隨轉對治即是無礙自在對治所謂若彼外人作如是事亂行者心所亂行者即作是念從無始來此事如是終不破事所以者何如是諸見本有本覺自家實德非過患故若作是解諸邪見類伏從如化所以者何隨見增損無漏性德亦大小故二相逆相違對治即是簡擇別相對治所謂若彼外人作如是事亂行者心所亂行者即求方便逆回違移相反相違令簡擇故三俱行對治即是具足俱轉對治所謂一時具足逆順二治不離轉故四俱非對治即是無念無依對治所謂於一切法無有所念無有所慮無有所著無有所求其心寂靜住無住故如是對治相於後文中説相明故此決擇中略去而已本曰若於坐中現形恐怖或現端正男女等相論曰此顯示所作業用門此門有二一是總二是別總相云何所謂如上所説一切邪類現六道像亂行者心故今當作釋分明散説若鬼及神多分造作地獄餓鬼畜生阿修羅之四道亂行者心如本若於坐中現形恐怖故若魔多分造作天道亂行者心如本或現端正故若外道衆多分造作人道亂行者心如本男女故言等相者即是同相所謂造作同品依正亂行者心故本曰當念唯心境界則滅終不為惱論曰此説通達對治行法門謂有衆生作如是觀一切諸法唯一心量無心外法已無外法豈一心法與一心法作障礙事亦一心法與一心法作解脫事無有障礙無有解脫一心之法一即是心心即是一無一別心無心別一一攝法界心攝法界無量無邊妄想境界寂靜無起中中離相一切諸法平等一味一相無相作一種光明心地之海風風永止波波盡住是名通達對治之相所以者何一切行者若不歸此對治門者無以摧邪道伏謬執故本曰或現天像菩薩像亦作如來像相好具足論曰此説別相所作業用門此門有八一出現人相令信門二出現言説亂識門三得三世智惑人門四不離世間縛纏門五心性無常生亂門六令得邪定非真門七勸請行者離邪門八簡擇真偽令了門如其次第説相應觀此即第一門有三種人一天二菩薩三如來如是三人所治六門文非要故恐繁不録今唯取能治若清妙天子天女像來到行者所時邪正差別云何知耶此何所疑由雜亂故此義云何謂無量光明契經中作如是説若修行者其心清淨無量無邊諸天女雨種種妙華燒種種所有名香出現種種微妙妓樂開布種種勝妙莊嚴具甚可愛樂貌來到行者所供養行者所以者何重其法故彼外道人亦作天像來到行者所如前無異者其邪正差別難可了知故解釋此疑即有六門一者呪知根壞不壞門謂誦對治陀羅尼呪若真實天不壞其根若虗偽天諸根壞失皆無所有以之為別誦呪形相其相云何謂有二意故一者誦外呪時若真實天無增減異若虗偽天其諸根相漸漸增長二誦內神呪相如其次第不超數量如如誦故以之為別言內呪者其相云何謂且呪眼即誦呪言怛跮哆嚤呵鳩尸帝迦那毗只帝𡄣哆尸斯塢婆䟤陀尼婆怛奢毗呵哪帝阿枳尼嚤枳尼陀陀帝娑婆呵帝嚤呵娑婆訶帝娑婆訶若此神呪誦三七遍眼根壞失皆無所有所餘諸處各有神呪而無要故略去不釋二嚴具圓珠有無門若真實之天者其莊嚴具中有十圓珠若虗偽天者其莊嚴具中無此珠故以之為別三身光眼入不入門謂且彼行者目閉時中若真實天其身光明入於眼內若虗偽天不入眼內以之為別四頭髮末結不結門謂見髮相若真實天雨末相結若虗為天兩末互解以之為別五雙背無所取著門謂觀若真天若偽天唯自妄心現量境界無有其實無所著故以之為治六俱取攝不除遣門謂觀若真天若偽天皆一真如皆一法身無有別異不斷除故以之為治次説對治菩薩形像門有二種一誦呪了知邪正門謂且呪心即誦呪言怛阿哆那毗提嚤鳩帝婆尼婆婆尼嘶咇提闍那那尸塢嚤阿只陀阿只陀娑婆呵若此神呪誦八百十遍已訖即彼菩薩漠漠不動譬如木石以之為治一切根及莊嚴具中各有神呪等多種門而無要故略而不説二智慧觀察無著門謂以智慧觀察諸法空無相理無執著故次説對治如來形像門亦具二門名如前説言神呪門者其相云何謂且呪光明即誦呪言哆嘻怛唵那羅帝岒枳羅㕧馱尸闍鍵尼婆鍵尼嚤那㖿塢婆帝闍摩羅娑婆呵若此神呪誦四百遍若實如來其身光明則不損減若偽如來其身光明即便損減作闍之色以之為別彼第二門觀所前説應審思惟謂有外道造作一切種種異類來到行者所亂行者心爾時當各誦何等呪謂有神呪是通非別所謂如來總持法藏因緣契經中所説神呪大陀羅尼謂彼經云爾時文殊師利即白佛言世尊一切種種邪道之類來到于行者所亂行者心時當須何等門而以除遣於是如來即告文殊師利言有深法門能善通治一切邪道所謂諸佛無盡藏無礙自在印陀羅網隨順隨轉總持大陀羅尼法門文殊師利諦聽諦聽善思念之我當為汝分別解説文殊師利所言通達無礙自在總持大陀羅尼法門者十方三世一切諸佛所護念之寶藏十方三世一切菩薩常所誦持之大軌則十方三世一切神王及一切天人皆悉禮拜供養之廣大福田焉於是世尊即誦呪言怛嘻咃那羅尸伽諾塢帝遮𠼦哆娑毗提阿呵陀尼婆伽婆尸帝馱馱塢嚤𠼝闍那筏尼帝伽坦尸婆㖿哆鳩那婆提娑婆嚤伊婆哆尼毗舒訶塢佉哆陀尼提叉阿㖿鍵那尸娑婆呵若此神呪誦八千七百五十一遍已訖隨所應一切邪類皆悉退失不能惱亂故本曰或説陀羅尼或説布施持戒忍辱精進禪定智慧或説平等空無相無願無怨無親無因無果畢竟空寂是真涅槃論曰此説出現言説亂識門此門有三一説陀羅尼門二説修行因門三説果滿德門如是三説各何人説所謂若天像多説陀羅尼若菩薩像多説行因若如來像多説果德所以者何各説自得行者信故所説陀羅尼當其相云何所謂而能説光明連續陀羅尼故若誦此呪當有何利謂若誦此呪自身光明續他身故是故天像來到彼修行者所中説此陀羅尼門已説即彼行者古無光明今有光明極歡喜故作如是念我今承修行之力故今有如是殊勝光明亂自正行入外邪網以此義故彼天像説陀羅尼門即誦呪言阿哆嚤嚤阿婆尸那佉㖿塢婆沙尼帝佉㖿𭊎呵伽帝怛哆婆尸呵筏那鳩筏帝迦嚤𠼝叉坦尼陀㖿哆陀尼娑婆呵婆婆娑婆呵阿哆尼婆哆尼娑婆呵若此神呪誦五千三百遍已訖即便光明相續作一焉爾時行者即誦呪言怛嘻哆𠼦尼阿婆陀帝叉跋那尼㖿嚤塢提婆佉那羅帝毗呵塢帝跋跋那提哆筏陀阿嚤囉娑婆呵若此神呪誦一百遍彼身光明斷絶不著終不為惱次説修行行因門修行因門雖有無量而不出六種波羅蜜是故彼像為修行者説六資糧亂彼行者令入邪網彼外道人當有何利作如是説亂行者邪彼修行者當時意樂斷一切惡修一切善圓滿因行無所闕失彼外道人示現同心令捨離正道趣向邪道故説六度次説果滿德門圓滿果門雖有無量而不出寂靜涅槃界是故彼像為修行者説涅槃德亂彼行者令入邪網彼外道人當有何利作如是説亂行者邪彼修行者彼因意趣當證果故是故外道出現行者所欲求之殊勝果德彼行者心能令愛著趣向邪道如本或説平等空等本曰或令人知宿命過去之事亦知未來之事得他心智論曰此説得三世智惑人門如是三達智各其相如何所謂若過未之二達智各達自境其最遠際八萬劫量其最近際能善通達經一生事言現達智者即是他心智所謂而能達現在人種種心故如本得他心智故本曰辨才無礙能令衆生貪著世間名利之事論曰此設不離世間縛纏門謂外道人令使成就一億四萬六千種諸世論之辨十萬八千種諸戲論之才縛纏衆生止住世間不得出離故本曰又令使人數嗔數喜性無常準或多慈愛多睡多病其心懈怠或卒起精進後便休廢生於不信多疑多慮或捨本勝行更修雜業若著世事種種牽纏論曰此説心性無常生亂門所謂破壞堅固之信而能令發無常之心斷修行之足絶趣入之路引入邪網及無性故本曰亦能使人得諸三昧少分相似皆是外道所得非真三昧或復令人若一日若二日若三日乃至七日住於定中得自然香美飲食身心適悅不飢不渴使人愛著或亦令人食無分齊乍多乍少顏色變異論曰此説令得邪定非真門謂外道人得二十一種邪三昧亂修行者入邪網故本曰以是義故行者常應智慧觀察勿令此心隨於邪網當勤正念不取不著則能遠離是諸業障論曰此説勸請行者離邪門勸修智慧諸善分別除愚癡之病遣邪論之謬故本曰應知外道所有三昧皆不離見愛我慢之心貪著世間名利恭敬故真如三昧者不住見相不住得相乃至出定亦無懈慢所有煩惱漸漸微薄若諸凡夫不習此三昧法得入如來種性無有是處以修世間諸禪三昧多起味著依故我見繫屬三界與外道共若離善知識所護則起外道見故論曰此説簡擇真偽令了門所謂隨順於世間中名偽三昧若隨順於出世間中名真三昧二種三昧應如是知本曰復次精勤專心修學此三昧者現世當得十種利益論曰説讚歎三昧功德門即有二門一總標門二散説門此總標門總標所説故本曰云何為十一者當為十方諸佛菩薩之所護念二者不為諸魔惡鬼所能恐怖三者不為九十五種外道鬼神之所惑亂四者遠離誹謗甚深之法重罪業障漸漸微薄五者滅一切疑諸惡覺觀六者於如來境界信得增長七者遠離憂惱於生死中勇猛不怯八者其心柔和捨於憍慢不為他人所惱九者雖未得定於一切時一切境界處則能滅損煩惱不樂世間十者若得三昧不為外緣一切音聲之所驚動論曰此散説門中自有二門一總問門總問所説故二別説中有十種勝妙功德由一真定而所成就一守護功德常為一切無量無邊諸佛菩薩所護念故二怖魔功德能善降伏一切魔故三出道功德能善出離一切外道諸邪道故四離謗功德能善遠離誹謗大乘等諸罪故五決疑功德能善決斷諸疑惑故六深信功德於勝妙境起樂信心更轉深故七勇猛功德緣衆生界起大悲心集成萬行無懈怠故八無我功德能善斷除一切我慢作意皆是佛法清淨意故九猒離功德於一切時處等諸境界中能善伏除種種煩惱下樂世間生死之海故十寂靜功德於一切諸散動境界其心安定無有動故如文次第可知本曰復次若人唯修於止則心沈沒或起懈怠不樂衆善遠離大悲是故修觀論曰此説兩輪具闕益損門此有六門一示闕觀止輪失門二顯示修行觀輪門三緣衆生界立願門四兩輪俱轉不離門五顯示兩輪所治門六總結兩輪俱轉門此第一門中有四過失一沈淪過失其心昧略不能覺了如人摩鍵呵尸暗室中故如本則心沈沒故二不勤過失其心懈怠不能精進如阿那毗提人故如本或起懈怠故三背善過失其心專一不能分別應作不應作如婆多呵彌尸人故如本不樂衆善故四離悲過失其心安寂不能發起大慈悲心如壞根人所自欲中更不增故如本遠離大悲故是故修觀者即是觀俱轉故本曰修習觀者當觀一切世間有為之法無得久停須更變壞一切心行念念生滅以是故苦論曰此顯示修行觀輪門此門有三一苦相觀門二無常觀門三不淨觀門初苦相觀即有二種一壞苦所謂一切有為之清淨法能壞一切不清淨法亦一切諸不清淨法能壞一切清淨法故復次二種世間互相破壞故一具足一切世間二妄相有為世間如是二種世間之法相破壞故是故説言壞苦而已若修此觀當得何利所謂成就一自作一甚深法故二行苦謂一切心行於念念中常恆遷轉速生速滅不能從此處至于彼處故本曰應觀過去所念諸法恍忽如夢應觀現在所念諸法猶如電光應觀未來所念諸法猶如浮雲忽爾而起論曰此説無常觀門此有三種一已過無常過去諸法前有後無譬如彼夢熟眠時有已乃覺悟時無有故二今有無常現在諸法古無今有譬如電光即時便滅不能久停故三當有無常未來諸法無有自性而忽然至譬如浮雲不知有所而忽然起遍十方故本曰應觀世間一切有身皆悉不淨種種穢污無一可樂論曰此説不淨觀門謂緣種種身作不淨解遠離貪故本曰如是當念一切衆生從無始世來皆因無明所熏習故令心生滅已受一切身心大苦現在即有無量逼迫未來世苦亦無分齊難捨難離而不覺知衆生如是甚為可愍論曰此説緣衆生界立願門此門有二一緣衆生作思惟門二建立誓願遍布門此即初門所謂緣三界中無量無邊一切衆生作如是念從無始來根本無明所覆藏故棄背自本覺清淨佛歸源無日出無明藏更復時遠我若不發悲心不攝取者又之又之唯過劫數取正覺期實無其齊發起無邊大悲心故本曰作此思惟即應勇猛立大誓願願令我心離分別故遍於十方修行一切諸善功德盡其未來以無量方便苦拔一切苦惱衆生令得涅槃第一義樂論曰此建立誓願遍布門所謂作如是思惟已訖即立大誓願起十方世界微塵數光明般若達十方世界微塵數種種心相對治十方世界微塵數一切諸煩惱業障海圓滿十方世界微塵數行因證得十方世界微塵數果德皆悉令無餘故本曰以起如是願故於一切時一切處所有衆善隨己堪能不捨修學心無懈怠論曰此説兩輪俱轉不離門所謂起如是願已訖即直修習行因之海故本曰唯除坐時專念於止若餘一切悉當觀察應作不應作論曰若起願海不勤修行不能莊嚴圓滿果故本曰若行若住若起若臥皆應止觀俱行論曰若為修行當如何耶謂兩輪令無偏故本曰所謂雖念諸法自性不生而復即念因緣和合善惡之業苦樂等報不失不壞雖念因緣善惡業報而亦即念性不可得論曰此具兩輪相何契經中分明顯示謂文殊師利發起十萬一千種甚深廣大圓滿陀羅尼開門大覺尊益大衆海契經云爾時文殊師利即白佛言世尊云何名為止觀俱行不相離門我及一切無量無邊大衆之海皆悉入於不知不覺無明之海不能通達不能出離如宜世尊願為我等諸迷子女分明顯示爾時世尊即告文殊師利言諦聽諦聽善思念之我當為汝分別解説於是世尊即説伽陀言譬如闕翼鳥及一輪之車一足人同分闕眼嶮之馬無有高遠翔隨所應運載其道路遊行不墮趣惡坈若具足一輪闕一輪行者亦復如是知以其實無有法性虗空中乘如量知翔入於法藏海運載義理寶真如平道中同遍通遊行一切魔外道邪見深坈中不倒墮坈故是故諸行者兩輪具足轉終不可捨離若有修行者不具此兩輪終不能通達無上大覺地今此經文為欲顯示修習三昧達寂靜境修習智慧照散動境在寂靜中常不捨動在散亂中常不捨寂而不相捨離俱行俱轉故復次為欲顯示修習三昧達空無境修習智慧照在有境在空不著有在有不染無有無雙照無有偏邊而不相捨離俱行俱轉故復次為欲顯示修習三昧達平等理修習智慧照差別事理事雙達無有偏邊而不相捨離俱行俱轉故復次為欲顯示止當待觀方得建立非自性止觀當待止方得建立非自性觀亦無有止無有觀故復次為欲顯示止則是觀觀則是止止觀一體無差別故如其次第應審思擇本曰若修止者對治凡夫住著世間能捨二乘怯弱之見若修觀者對治二乘不起大悲狹劣心過遠離凡夫不修善根論曰此説顯示兩輪所治門若有行者修習止輪當為對治凡夫衆生著有過失二乘衆生樂空過失俱絶離故若有行者修習觀輪當為對治二乘衆生遠離大悲不救衆苦下劣過失凡夫衆生常恆懈怠不能精進不修善品樂惡過失俱出離故本曰以此義故是止觀二門共相助成相不捨離若止觀不具則無能入菩提之道論曰此説總結兩輪俱轉門所謂總結如上所説輪闕行者大過失故本曰復次衆生初學是法論曰此説勸劣向勝不退門此中有六一顯示假人所學教法門二猒惡處所退信門三如來方便殊勝門四承力得勝妙處門五得善處定不退門六引經證自所説門此即初也言趣向假人者所謂顯示得十信位前四種心更不勝進下品衆生故如本復次衆生故言歸依所覺教法者彼十信位下品衆生歸依甚深無極大乘初學習故所謂一切諸佛所師三世不動四相不遷自然常住地前地上大道路故如本初學是法故本曰欲求正信其心怯弱以住於此娑婆世界自畏不能常值諸佛親承供養懼謂信心難可成就意欲退者論曰此猒惡處所退信門彼十信位下品衆生雖親聽受甚深法門而其心根極下劣故怖二大事不能勝進為欲退故一國土即此娑婆世界處所粗惡衆生濁亂發起淨心為勤修行甚極切難故所以者何於彼心中違逆境界於一切時於一切處常恆現前進心面中不捨離故二勝緣於此世界依正濁亂一切諸佛出世極鮮無量菩薩赴感時節極遠諸佛菩薩出現於世隨順清心之境淨不淨故以此義故彼修行者不值勝緣極怖畏故發退意耳本曰當知如來有勝方便攝護信心謂以專意念佛因緣論曰此如來方便殊勝門謂諸佛如來有不可思議甚深極妙大方便故能善攝護彼人信心轉勝進故云何名為勝妙方便所謂專念如來方便云何專念謂專注意憶念他方淨土種種依正其念相續令不絶故本曰隨願得生他方淨土論曰此承力得勝妙處門以諸如來不可思議方便力故隨自所願即得往生妙樂土故本曰常見於佛承離惡道論曰此得善處定不退門謂生彼土已眼見如來具相好像耳聞聖説深妙音聲永離惡名從定不動心海澄淨身體明白依正清淨故本曰如修多羅説若人專念西方極樂世界阿彌陀佛所修善根回向願求生彼世界即得往生常見佛故終無有退若觀彼佛真如法身常勤修習畢竟得生住正定故論曰此引經證自所説門所謂該攝説相屬當經本之辭讚自所説解釋文故所引經文説相明故須不重釋本曰已説修行信心分次説勸修利益分如是摩訶衍諸佛祕藏我已總説論曰就此文中即有八門一舉前所説總結門二舉益勸人令修門三顯離疑信功德門四比類為對示勝門五舉受持功讚揚門六舉誹謗過令怖門七殊勝廣説離謗門八總結修行勸人門此即初門謂以一總字總結八種摩訶衍故何故餘法略不結焉所謂舉本攝其末故本曰若有衆生欲於如來甚深境界得生正信遠離誹謗入大乘道當持此論思量修習究竟能至無上之道論曰此舉益勸人令修門所謂集成行因之海而為莊嚴法身之果受持此論思惟義理常恆相續不斷絶故本曰若人聞是法已不生怯弱當知此人定紹佛種必為諸佛之所授記論曰此顯離疑信功德門謂有衆生聞此摩訶衍甚深極妙廣大法門已即其心中亦不疑畏亦不怯弱亦不輕賤亦不誹謗發決定心發堅固心發尊重心發愛信心當知是人實真佛子不斷法種不斷僧種不斷佛種常恆相續轉轉增長盡於未來亦為諸佛親所授記亦為一切無量菩薩之所護念故本曰假使有人能化三千大千世界滿中衆生令行十善不如有人於一食頃正思此法過前功德不可為喻論曰此比類為對示勝門謂若有人能善攝化三千大千世界中遍滿衆生皆悉無餘令行十善或有衆生於一食頃於此甚深法觀察思惟若挍量此二人功德彼第一人所得功德深極微少譬如芥子碎作百分一分之量此第二人所得功德甚深廣大譬如碎十方世界微塵數量故本曰復次若人受持此論觀察修行若一日一夜所有功德無量無邊不可得説假令十方一切諸佛各於無量無邊阿僧祇劫嘆其功德亦不能盡何以故謂法性功德無有盡故此人功德亦復如是無有邊際論曰此舉受持功讚揚門謂若有人受持此論觀察義理若一日若一夜中間所得功德無量無邊不可言説不可思量若假使十方三世一切諸佛十方三世一切諸菩薩以十方世界微塵數舌各各皆悉於十方世界微塵數量不可説劫讚揚其人所有功德亦不能盡所以者何法身真如之功德等虗空界無邊際故何況凡夫二乘之人能稱歎之一日一夜不多中間受持人尚所得功德不可思議何況若二日若三日若四日乃至百日中受持讀誦思惟觀察不可思議中不可思議不可説中不可説故本曰其有衆生於此論中毀謗不信所獲罪報徑無量劫受大苦惱論曰此第六舉誹謗過令怖門謂有衆生於此論教生不信心破謗不行如是衆生所得罪報於諸不可説不可説劫中受苦中之重大苦故本曰是故衆生但應仰信不應誹謗以深自害亦害他人斷絶一切三寶之種論曰即是總結上説決擇勸請行者自此已下作其因緣示重過失謂此法中不信誹謗失自善根損他功德斷絶一切三寶之種無續期故本曰以一切如來皆依此法得涅槃故一切菩薩因之修行入佛智故論曰此第七殊勝廣説離謗門謂十方三世諸如來一切皆悉以摩訶衍為其根本成正覺故十方三世無量菩薩一切皆悉以摩訶衍為其根本具因海故如是重深摩訶衍法若有衆生生不信心諍論誹謗如是衆生亦名斷滅一切諸佛亦名斷滅一切菩薩亦名斷絶自如來藏本覺佛故本曰當知過去菩薩已依此法得成淨信現在菩薩今依此法得成淨信未來菩薩當依此法得成淨信是故衆生應勤修學論曰即是總結修行勸人門應審思擇本曰諸佛甚深廣大義我今隨分總持説回此功德如法性普利一切衆生界論曰此回向遍布門此一頌中有三種門一攝前所説總結門二展舒功德令廣門三施於衆生普利門初門有二一通總攝前所説門二顯示能説字相門如其次第應審觀察諸佛甚深廣大義者即是通總攝前所説門所謂通攝三十三種本數法故此義云何言諸佛者即是不二摩訶衍法所以者何此不二法形於彼佛其德勝故大本華嚴契經云其圓圓海得諸佛勝其一切佛不能成就圓圓海劣故若爾何故分流華嚴契經云盧舍那佛三種世間為其身心三種世間攝法無餘彼佛身心亦復無有所不攝焉盧舍那佛雖攝三世間而攝不攝故是故無過言甚深者即是兩重八種摩訶衍之本法以何義故名為甚深如是兩重摩訶衍法能入門望極甚深故以此義故立甚深稱應審思擇言廣大義者即是兩重能入門法以我義故名廣大義如是兩重能入門法皆悉各各能廣自法能大自法能為自法作名義故以此義故建立廣大義名字焉言我今隨分總持説者即是顯示能説字輪門謂以總字通持一切種種説故立義分中摩訶衍者總即是此焉何故一字通持諸説為欲顯示摩訶衍論如意論故言回此功德如法性者即是展舒功德令廣門謂自所作之功德回向三處故一真如二一心法三本覺佛性以何義故回向三處謂為欲自所作功德令平等故回向真如為欲自所作功德令廣大故回向一心法為欲自所作功德令明了故回向本覺應如是知應如是觀如是回向有何利益謂衆多故此義云何譬如用一微塵置大地中所置微塵與彼大地等無差別回向法門亦如是故又譬如用一注水置大海中所置水注與彼大海等無差別回向法門亦如是故又譬如破一小有即與大虗空等無差別回向法門亦如是故言普利一切衆生界者即是施於衆生普利門謂舉廣大圓滿功德周遍利益衆生界故歡喜大士至心勸無量佛子衆海中我已超毛頭三角過於生死之四根第一無數粗滿訖第二僧祇始入無如宜汝等諸佛子已於左右之兩手捧於本釋之明鏡臨七識散慮之面見六塵境界之垢洗法執人我之咎汝等佛子若如是法身應化之三身如舒伊字圓現前常樂我淨之四德如入達池具出生我從四王自在處下入大海龍宮殿隨分窺諸契經海總有一百洛叉數如是諸經真實法無量無邊差別義摩訶衍論立義中該攝安立具足説有善男子善女人若自手捧斯論卷名捧百洛叉經者若自口經誦本分名誦百洛叉經者此人所得之功德十方世界微塵數諸佛及大菩薩衆各出微塵數舌相如是微塵數劫中不息稱説不能盡何況觀察其義理思惟文下之所詮有善男子善女人生不信心謗斯論此人所得之罪業十方世界微塵數諸佛及大菩薩衆各出微塵數舌相如是微塵數劫中不息説過不能盡是人往罪滅無所一切諸佛不能救是故行者歸本源當依斯論應修行實不可生不信心誹謗甚深大乘教當願此勸遠流布遍於重重不説剎依釋摩訶衍那略屬本論文以石山寺本校合了
