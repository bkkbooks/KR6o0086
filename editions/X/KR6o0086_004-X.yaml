body:
  text: 本曰復次真如自體相者論曰自此已下分明顯示生滅門中三種大義自有三門一顯示自體大義門二顯示自相大義門三顯示自用大義門此即是初總標體相二義自此已下別釋散說本曰一切凡夫聲聞緣覺菩薩諸佛無有增減論曰初大義中即有二門一人平等門二時不轉門此即初門謂真如自體通於五人平等平等無差別故云何名為五種假人一凡夫二聲聞三緣覺四菩薩五如來如是五名人自是五真自唯一所以者何真如自體無有增減亦無大小亦無有無亦無中邊亦無去來從本已來一自成一同自作同猒異捨別唯一真故是故諸法真如一相三昧契經云喻如金剛作五趣像五人平等亦復如是於諸人中無有增減故本曰非前際生非後際滅畢竟常恒論曰此明時不轉門謂真如自體自然常住決定不變三際不動四相不遷寂滅又寂滅真實又真實故本曰從本已來性自滿足一切功德所謂自體有大智慧光明義故遍照法界義故真實識知義故自性清淨心義故常樂我淨義故清凉不變自在義故論曰此下明自相大義中即有三門一圓滿功德門二問答決疑門三別釋廣說門此即初門其相云何謂真體中圓滿一切功德無所少故何等功德所謂六種性義功德一大智慧光明義本覺般若能除無明之闇夜故於契經中名廣大圓滿殊勝般若實智光明性義二遍照法界義本覺般若照達一法界之源故於契經中名周遍通達一法界藏自然性義三真實識知義本覺般若遠離虗假之解量故於契經中名離妄想解決定了知實際實性義四自性清淨心義本覺般若無量性功德自然本有非得他力遠離塵累契中實故於契經中名本有明白離邊中中性義五常樂我淨義本始二覺從無始來遠離四障圓滿四種自然德故於契經中名如來正覺自然性德遠離炎幻不修行性義六清凉不變自在義二種本覺譬如明鏡之南北相具隨意故於契經中名具足隨順逆違無礙陀羅尼全遍性義廣大圓滿自性本德契經云自性功德本教之名有十七者於初二中各開二種於次二中各開三種於後二中如其次第開四三故復次清淨心地無垢陀羅尼契經中自性功德本數之名有二十五者㝡後一中開十一故如是三數別相云何馬鳴菩薩摩訶衍論本數名字為欲顯示名略義廣總持相故是故攝散總立為六復次所依別本總持說故復次名字數多迷真實故以此義故總立為六言十七者名字云何一大智慧義二大光明義三遍一法界義四照一法界義五真實義六識義七知義八自性義九清淨義十心義十一常義十二樂義十三我義十四淨義十五不義十六變義十七自在義言二十五者名字云何所謂前數不功德中開八種故變功德中開二種故言二變者一上流轉變二下流轉變言八不者中觀論中分明說故本曰具足如是過於恒沙不離不斷不異不思議佛法論曰此說無名過量功德分本覺體中自性功德無量無邊離於言量過於心行以何義故止於數量作如是剖本有功德雖無有量不出三數故舉本耳如本具足如是過於恒沙故如是無量無邊功德各各別別有體相耶唯一心量無別法體唯一心量終不離心所以者何心法雖一而有二種陀羅尼自在用故一自不離彼陀羅尼自在二彼不離自陀羅尼自在如本不離故如是性德從無始來一向妙有非除遣法所以者何自性自性非他俱故如本不斷故如是一切德唯一自作一終異自不能作一所以者何一法界故如本不異故如是深理一切菩薩二乘凡夫心不思惟言不論量絕之又絕遠之又遠如本不思議故三人非境當何人之言思境界唯大覺者乃自軌則如本佛法故本曰乃至滿足無有所少義故名為如來藏亦名如來法身論曰如是無量性之功德從具縛地乃至無上大覺智地具足圓滿無所少闕所以者何如是諸德從無始來自然本有非假緣力而建立故本曰問曰上說本真如其體平等離一切相云何復說體有如是種種功德論曰此下問答決疑門此中有二一發起略問難違門二發起廣答解釋門此初門也問者難意其相云何謂舉說文相違前後雜亂審其理故前後之文云何相違所謂真如決擇分中作如是說心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切法從本已來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如自相大義決擇分中依如是說從本已來性自滿足一切功德所謂自體有大智慧光明義故乃至滿足無有所少義故名為如來藏亦名如來法身如是相違故以為難本曰答曰雖實有此諸功德義而無差別之相等同一味唯一真如論曰此發起廣答解釋門即有二門一真如總二生滅總此即真如總謂雖自相大義門中作如是說具種種德過於恒沙而是生滅門之界量非真如門真如門中無差別相平等平等一相一味獨存真如淨法界故以此義故無相違過本曰此義云何以無分別離分別相是故無二論曰此即作其緣由決斷疑惑明真如門中唯有同同無異異故本曰復以何義得說差別論曰此釋生滅總此中有二一問二答有廣略故二重問答不同此初重問也謂若諸法從本已來平等平等一味一相獨存真理無二體者復有何法而非平等以之為依建立差別即是舉異門以疑異門焉本曰以依業識生滅相示論曰此即總答謂真如門中無過恒沙一切染法以為所治無能治之過於恒沙一切淨法以為對量是故真如門中作如是說一切諸法平等平等一味一相無有二體等焉而此生滅門中所治染法無量無邊能治淨法亦無量無邊是故生滅門中作如是說本覺體中具種種德無量無邊過恒沙等焉即是大意次當作釋別別散說所言依者即是根本無明住地一切染法之所依故所言業者即是業相所言識者轉等諸識生滅相者門之總稱所言示者相返顯示此中以字遠流應至于三字如是三法功德之起當緣由故本曰此云何示論曰此廣說分此有二種一問二答此中問略答廣應知此云何示者即是詰問所謂詰問其所由故本曰以一切法本來唯心實無於念論曰此直答即有三種一自宗正理二非道邪行三具舉對量此即第一所謂法性從無始來唯是一心無一一法而非心故本曰而有妄心不覺起念見諸境界故說無明論曰此非道邪行所謂總舉本上諸無明住地故本曰心性無起即是大智慧光明義故若心起見則有不見之相心性離見即是遍照法界義故若心有動非真識知無有自性非常非樂非我非淨熱惱衰變則不自在論曰此直顯具舉對量差別如上所說本覺體中六相功德各各待觀何等過患以之為對建立顯示所謂根本無明熏習一心之海發起業等種種諸識隱覆般若實知之明增長愚癡迷亂之闇即是不覺無明之界量明以之為對一心之性寂滅無起即是大智慧光明義故若第二德如是妄心起見達境一向唯轉虗妄境中不能通達真實境界所以者何真偽相違不契當故如本若心起見則有不見之相故此下明遍觀義而真實心離轉見故通達諸法無所不至無所不當無所不盡所以者何真實智見離能見所見之邊見如本心性離見即是遍照法界義故第三德者所謂若心有動轉相即是無明熏習氣故虗妄轉明以之為對心性寂靜無有喧動正直無有顛倒之解即是實智之照隨順道理無倒建立顯示如本若心有動非真識知故第四德者所謂妄法從無始來無自體明以之為對自性清淨本有功德建立顯示如本無有自性故第五德者所謂妄法四相之所遷故非常三種苦俱轉故非樂二種自在無故非我一道清淨無故非淨此四種過以為對量本覺體中四種功德建立顯示如本非常非樂非我非淨故第六德者所謂妄法燒真心故是故名熱又以是惱亂諸眾生故是故名惱破滅變德令不作故是故衰變由此事故一切眾生不得自在是故亦名為不自在待觀此事以為對故清凉不變自在之德建立顯示如本熱惱衰變則不自在故本曰乃至具有過恒沙等妄染之義對此義故心性無動則有過恒沙等諸淨功德相義示現論曰此顯示無邊功德相義所謂若所對治染法無量無數以能治之淨法亦無量無邊故本曰若心有起更見前法可念者則有所少如是淨法無量功德即是一心更無所念是故滿足名為法身如來之藏論曰此結圓滿德所謂若一心法有動轉相更見前境有何緣者能見之心所見之境二差別故本覺功德則不圓滿而本性德雖過恒沙唯一心量終無二體所以者何如是諸德悉皆各各不分其體於一法界其量等故是故圓滿自性功德結縛解脫之二位中常恒具足名為法身亦名如來藏染淨數量平等決擇依何契經所解釋耶所謂文殊師利善巧方便相似譬喻大陀羅尼經云爾時文殊師利承佛神力即說嗢吒喃頌曰譬如阿只多遮那尸帝樹其菓多無數表實有十等染淨數量等亦應如是知行者依此喻可了真妄理今此經文為欲顯示假當待實真定賴妄無有獨孤自立法故所言表者謂喻妄法妄假無實如菓外故所言實者謂喻真法真實無假如菓中故云何名為十種等耶一數等表實契當其數等故二塵等表實細末配其數量等無差故三量等表實稱量終無差別輕重等故四色等表實校量同白色故五香等表實熏習其香等故六味等表實噉食無差別故七觸等表實觸身等無別故八本等表實同依樹木出故九俱等表實一時無前後故十同等表實終一味故舉喻合法說相明故不須重釋復次若鈍根者不達此事依功德黑闇之譬喻應知等意本曰復次真如用者所謂諸佛如來本在因地發大慈悲修諸波羅蜜攝化眾生立大誓願盡欲度脫等眾生界亦不限劫數盡於未來以取一切眾生如己身故論曰此用大義門中自有六門一本願無盡門二離相不着門三能所平等門四無相現應門五隨見麤細門六問答決疑門此即初門清淨僧那阿世耶廣大圓滿無邊際故謂諸如來無量無邊不可思議不可稱量微塵劫中興十方世界微塵數量大慈悲心海修十方世界微塵數量大圓滿因海攝十方世界微塵數量一切眾生海立十方世界微塵數量廣大誓願海成十方世界微塵數量大自在果海故所以者何以如實知同一無異相續義故本曰而亦不取眾生相此以何義謂如實知一切眾生及與己身真如平等論曰此離相不着門謂於所作中遠離所作不生着故謂諸如來雖發無量無邊大悲攝化一切恒沙眾生而諸如來無一一佛而攝生故所以者何如實了知一切眾生及與自身唯一真如唯一法身無有增減無差別故本曰以有如是大方便智除減無明見本法身自然而有不思議業種種之用即與真如等遍一切處論曰此能所平等門謂人法體用理智平等無差別故謂法身應化之三身及實實假假之二理平等一體無差別故自性本身及枝末身平等一體無差別故能證正智所證如理平等一體無差別故以一體故無有二體無二體故亦無一體無二無一亦無無耳以此義故自然本性具足功德不假他力甚深極妙契經云爾時文殊師利即白佛言云何名為異異異相云何名為同同同相佛言所言異異異相者即是無明所言同同同相者即是明法如是二法如牛兩角對治之相非消融體如兩空絕是故此二法名為非觀偽法於此文殊師利即承佛神力即從座起白佛言世尊云何名為非觀偽法其相可說耶不可說耶以何為門應覺知耶爾時世尊即告文殊師利言我諸一切契經海中作如是說異者無明同者明法為欲度脫愚癈凡夫權作此說而今日為汝真實言說文殊師利所言非觀偽法者同異歸同同同歸空空空歸絕乃至廣說故本曰又亦無有用相可得何以故謂諸佛如來唯是法身智相之身第一義諦無有世諦境界離於施作但隨眾生見聞得益故說為用論曰此無相現應門自性身體空寂無像能現諸像譬如兔角自體空無善能出生一切角故謂法身佛唯是一一唯是寂寂亦非一一亦非寂寂心行處滅言語道斷滅滅斷斷唯阿作阿故所以者何諸佛如來唯自自身無他身故而諸眾生見聞得益自心量中獲得利益法身體中無有闕故本曰此用有二種云何為二一者依分別事識凡夫二乘心所見者名為應身以不知轉識現故見從外來取色分齊不能盡知故論曰此隨見麤細門此有二門一應身用相差別門二報身用相差別門此即初門所謂一切凡夫二乘不能了達一切諸法唯一心量甚深宗故依遍分別妄想事識見應化身作外量解不能通達無有分界分分轉故本曰二者依於業識謂諸菩薩從初發意乃至菩薩究竟地心所見者名為報身身有無量色色有無量相相有無量好所住依果亦有無量種種莊嚴隨所示現即無有邊不可窮盡離分齊相隨其所應常能住持不毀不失論曰此第二門所謂從十解乃至金剛一切菩薩明了通達一切諸法唯一心量甚深宗故依彼業識見報身佛作唯識解通達依正無分際故何故應身章中作如是說依分別事識而見彼佛報身章中作如是說依於業識而見彼佛為欲顯示隨識麤細所見佛身有麤細故本曰如是功德皆因諸波羅蜜等無漏行熏及不思議熏之所成就具足無量樂相故說為報論曰此顯示報應之差別相所言報者有勝妙因受極樂果自然自在決定安樂遠離苦相故名為報本曰又凡夫所見者是其麤色隨於六道各見不同種種異類非受樂相故說為應論曰所言應者隨順機根而不相違隨時隨處隨趣出現非安樂相故名為應本曰復次初發意菩薩所見者以深樂信真如法故少分而見知彼色相莊嚴等事無來無去離於分齊唯依心現不離真如然此菩薩猶自分別以未入法身位故論曰此更作重釋明前所說所謂位位各各見佛增減別故此義云何若三賢位諸菩薩者信真如故分見報身觀知色相無分齊量而此菩薩不能離脫分別之心所以者何以未得入真如位故本曰若得淨心所見微妙其用轉勝乃至菩薩地盡見之究竟論曰若得十地諸菩薩者如其次第轉勝究竟本曰若離業識則無見相以諸佛法身無有彼此色相迭相見故論曰若佛果中業識本種無所有故能見所見亦復空無所以者何一切諸佛真如真如平等平等法身法身平等平等無此無彼無我無他無大無小無高無下無無無有戲論都盡慮知亦空唯一大空真如本智服遮伽利娑那提衣於鍵尸多陀摩宮自性身坐獨存無二故本曰問曰若諸佛法身離於色相者云何能現色相論曰此問答決疑門於中有二一問二答此問也所謂問者作如是疑尅其法身真實自體湛湛慮絕寂寂名斷色相作業由誰而有無相現應決擇分中作如是說法身無相能現色相若能出現種種色相不可言說法身空寂離色像域如是疑故本曰答曰即此法身是色體故能現於色所謂從本已來色心不二論曰此答說中即有五門一法身出現色相門二顯示智身形相門三顯示法身形相門四廣大圓滿無際門五不可思議殊勝門此即初門自性法身能為色相作所依止善出色相無障礙故所以者何能依色法所依心法從無始來平等平等無有二體唯一心量故本曰以色性即智故色體無形說名智身論曰此顯示智身形相門以智攝色無一一色而非智故說名智身本曰以智性即色故說名法身論曰此顯示法身形相門以色攝智無一一智而非色故說名法身本曰遍一切處所現之色無有分齊隨心能示十方世界無量菩薩無量報身無量莊嚴各各差別皆無分齊而不相防論曰此廣大圓滿無際門如是二身所說色相等遍一切眾生界一切非情界一切虗空界一切涅槃界一切如來界中無所不通無所不至無所不當無所不會無所不作亦無分際無障無礙純純一一無相亂故本曰此非心識分別能知以真如自在用義故論曰此不可思議殊勝門如是業用甚深極妙獨尊殊勝非凡夫二乘之所能知故如是三種甚深大義二種門中云何安立謂真如門中三種大義唯各立一無雙立故若生滅門中三種大義具足雙立無前後故以之為別是故大印陀羅網譬喻契經說有體大義無相及用有相大義無體及用有用大義無體及相如是三大有第一一無第二一復次有體大義當有相用有相大義當有體用有用大義當有體相如是三大隨第一一有第二一不相捨離故餘種種相結歸總持決擇分中自當理明本曰復次顯示從生滅門即入真如門所謂推求五陰色之與心六塵境界畢竟無念以心無形相十方求之終不可得論曰此說門自入門破異門今此論文為欲對治廣狹大小諸異執故謂有眾生作如是執一法界心是其本法亦廣亦大真妄二門是其末法亦狹亦小為欲對治此執著故作如是說門亦所入與本量等復次為欲顯示真如門中無有為法差別相故復次為欲顯示空五陰智如所空陰自體空無以此能空所空皆空為入真如平等門故復次為欲顯示生滅門假真如門實故本曰如人迷故謂東為西方實不轉眾生亦爾無明迷故謂心為念心實不動論曰此譬喻門中東方喻覺西方喻念為欲顯示本覺般若出現清淨智慧光明照耀幽冥生死闇夜譬如日輪出現已訖發淨光明破世間闇無明住地出生種種染法眷屬隱覆無量無漏之性清淨慧明譬如日輪隱沒已訖發大暗夜障覆分別了知清淨眼故本曰若能觀察知心無起即得隨順入真如門故論曰此明得益相謂有眾生了知心法無有能起所起別相即得成就真如隨順即得成就真如得入無有隨順無得入故本曰對治邪執者一切邪執皆依我見若離於我則無邪執是我見有二種云何為二一者人我見二者法我見論曰此對治文中自有四門一顯示根本總相門二顯示人見對治門三顯示法見對治門四顯示俱非絕離門此即初門無量無邊過恒沙數一切邪道無量無邊過恒沙數一切定執皆以我見為自所依出生增長更無有餘為此邪執依根本故是故無明住地無邊際契經說一切無量種種虗妄邪論之海以我見岳為依而轉譬如一切無量無邊種種林樹種種草木皆悉以山為依而轉故本曰人我見者依諸凡夫說有五種論曰此顯示人見對治門有二一總標總說二別別散說此即是初直為對治邪定聚及不定聚一切凡夫謬執過失生勝妙解故五種人見治鄣別相文相甚明故說本不論釋或者尚迷故以管見疏之而已然此五執各有三門一引經說意二迷意執相三依相對治也本曰云何為五一者聞修多羅說如來法身畢竟寂寞猶如虗空以不知為破著故即謂虗空是如來性又六了真妄有殊故謂虗空是如來性也本曰云何對治謂明虗空是其妄法體無不實以對色故有是可見相令心生滅以一切色法本來是心實無外色若無色者則無虗空之相所謂一切境界唯心妄起故有若心離於妄動則一切境界滅唯一真心無所不遍此謂如來廣大性智究竟之義非如虗空相故論曰說虗空是妄法即顯法身是真又明法身有自體實德故說虗空體無不實對色等者明空有待也對色見相意地所知迴色為性遍計所攝故云令心生滅豈同法身無對正智所證見相泯故以一切色等者色本是心空相無故所謂一切境界等者正明色空二種名一切境此二境界唯心妄起故有若心離於妄動則一切境界滅者若離妄動則無色空名一切境滅也二境滅故唯一真心即是法身體用周遍性智不滅故云非如虗空也本曰二者聞修多羅說世間諸法畢竟體空乃至涅槃真如之法亦畢竟空從本已來自空離一切相論曰明世間諸法體相都無用皆不實故說為空若真如涅槃體絕諸相一切染法皆不相應故說為空也從本已來等者正顯二空差別若世間法猶如空花性自空無故云本末自空故若真如涅槃體絕諸相故云離一切相也本曰以不知為破著故即謂真如涅槃之性唯是其空論曰以不知為破著故者占察經云者但一切眾生常樂分別取著諸法以顛倒妄想故而受生死是故如來為欲令彼離於分別執著想故說一切世間法畢竟體空無所有乃至一切出世間法亦畢竟體空無所有以迷說意又不了真俗二空全別故謂真如涅槃同世間法唯是空無也本曰云何對治明真如法身自體不空具足無量性功德故論曰此明真如法身具空不空故占察經云以彼法身性實無分別離一切諸相故說彼法體為畢竟空無所有復次即彼空義中以離分別妄想心念故則盡畢竟無有一相而可空者以唯有真實故即為不空故知法身自體不空離相云空也本曰三者聞修多羅說如來之藏無有增減體備一切功德之法論曰此是能攝如來藏藏中自性淨無明心能攝一切諸功德故云無有增減備一切德故不增不減經云如來藏本際相應體及清淨法此法如實不虗妄不離不脫智不思議法無始本際來有此清淨相應法體故此經所明一切眾生自性淨心從無始來功德圓滿無所闕失故本曰以不解故即謂如來之藏有色心法自相差別論曰由不知從能所淨立其名故復迷性德真妄相待示現義故又不了身心皆依如來圓覺所現故謂色心自相差別如圓覺經云譬如清淨摩尼寶珠瞙於五色隨方各現諸愚癡者見彼摩尼實有五色善男子圓覺淨性現於身心隨類各應彼愚癡者說淨圓覺實有如是身心自相亦復如是義可知也本曰云何對治以唯依真如義說故因生滅染義示現說差別故論曰依真如說者如上文云雖實有此諸功德義而無差別之相等同一味唯一真如因生滅等者上文云以依覺識生滅相示依此二理豈有色心差別相故本曰四者聞修多羅說一切世間生死染法皆依如來藏而有一切諸法不離真如論曰此明不空如來藏圓覺經云由如虗空華依空而相空華若復滅虗空本不動幻從諸覺生幻滅覺圓滿覺心不動故此中上二句明染依真有下二句明染滅真圓故云一切諸法不離如也本曰以不解故謂如來藏自體具有一切世間生死等法論曰以不解依空有華意故謂藏體具生死法也本曰云何對治以如來藏從本已來唯有過恒沙等諸淨功德不離不斷不異真如義故以過恒沙等煩惱染法唯是妄有性自本無從無始世來未曾與如來藏相應故若如來藏體有妄法而使證會永息妄者則無是處論曰唯有過恒沙淨位等者正明不空以過恒沙染法等者明此染法猶如空華唯依病眼性自無故從無始來等者染淨性異真妄有殊故云未曾相應也若如來藏體有妄等者此質成也空本無華實非起滅藏本無染何者永息而證會哉本曰五者聞修多羅說依如來藏故有生死依如來藏故得涅槃論曰此與行與相如來藏於或與力故有生死相覺與力故得涅槃故說生死真依如來藏本曰以不解故謂眾生有始以見始故復謂如來所得涅槃有其終盡還作眾生論曰以不了依真有妄便作是念一切眾生本來成佛後起無明故謂有始也復謂如來雖已成依佛後時應生一切煩惱還作眾生本曰云何對治以如來藏無前際故無明之相亦無有始若說三界外更有眾生始起者即是外道經說又如來藏無有後際故諸佛所得涅槃與之相應則無後際故論曰此明真妄相依如金與鑛故無前始也云外道經說者是仁王經云我說三界外別有眾生界藏者是外道大有經說云如來藏無後際等者此明真藏無妄染有盡如圓覺經云譬如銷金鑛金非銷故有雖復本來金終以銷成就一成真金體不復重為鑛此經所明金非銷故有者喻如來藏本有無前際也雖復本來金終以銷成就者喻諸佛要須斷或方得涅槃也一成真金體等者喻無後際也本曰法我見者依二乘鈍根故如來但為說人無我以說不究竟見有五陰生滅之法怖畏生死妄取涅槃云何對治以五陰法自性不生則無有滅本來涅槃故論曰此直為對治二乘眾生實有過失令得成就法空大理故二種法見治障別相文相明故不須重釋本曰復次究竟離妄執者當知染法淨法皆悉相待無有自相可說是故一切法從本已來非色非心非知非識非有非無畢竟不可說相而有言說者當知如來善巧方便假以言說引導眾生其旨趣者皆為離念歸於真如以念一切法令心生滅不入實智故論曰此顯示俱非絕離門者若有眾生除遣二執證得二空通達諸法言語道斷心行處滅斷斷照寂滅滅慮止無所達故本曰分別發趣道相者謂一切諸佛所證之道一切菩薩發心修行趣向義故論曰此趣向門中自有二門一總標總說門二者別釋散說門此即初門為欲顯示即此分別發趣道相門中無量無邊三世諸佛所誓願海所行因海所證果海所化徒海無量無邊三世一切諸菩薩眾如是如是如如隨踐順行應轉如其次第不超數量不過位地趣入義故復次為欲顯示如一切佛無所趣向則一切菩薩於彼無有趣向則中如如行故本曰略說發心有三種云何為三一者信成就發心二者解行發心三者證發心論曰此別釋門中自有三門一者三種發心分剖門二發起問答決疑門三因論生論問答門此即第一門有三謂信解證如文可見本曰信成就發心者依何等人修何等行得信成就堪能發心論曰此信成就門中即有二門一開問答釋二發起問答決疑初中有二重問答就初問答中有二一發起開問總標門二顯示答釋廣說門此是初門即有四意一假者意問能修人故二行相意問所修行故三自分意問得成就故四向上意問勝進相故如文可見本曰所謂依不定聚眾生論曰此顯示答釋廣說門有二一隨問次第答釋門二舉劣顯勝生解門初門有六一顯示修行假者門二自然本有熏習門三顯示修行功德門四信心成就時量門五顯示發心因緣門六顯示得益位勝門此是初門謂雖所化眾生無量無邊而今此處中且取不定聚攝十信眾生故所以者何為欲令使化不定聚三品眾生十種信心具足成就決定安立十信菩薩初發心住金剛不變之位中故本曰有熏習善根力故論曰此是自然本有熏習門謂如是眾生相續心中從無始世來常有本覺藏佛眾生善根常恒熏習令增長故本曰信業果報能起十善猒生死苦欲求無上菩提得值諸佛親近供養修行信心論曰此是顯示修行功能門謂不定聚種種眾生信因緣業果報似有不空因緣和合之道理故知十惡過失起不應作意觀十善功德起當應作意厭繫縛地求解脫域漸漸出離向菩提故本曰逕一萬劫信心成就故論曰此信心成就時量門謂顯示信心成就時節遠近差別相故即此門中十五契經各各異說一者一切諸法因緣無主契經云爾時文殊師利即白佛言尊者從具縛地入不定聚一切行者經幾時節十種信心具足成就漸漸轉勝定不退位於是尊者告文殊師利言善男子諦聽諦聽善思念之我當為汝解說信成時節分際善男子一切行者從具縛地入不定聚經一萬三千劫已訖即便成就十種信心決定菩薩初發心住二攝無量大乘契經說復次佛子信地假名菩薩六萬四千劫量已滿即便成就十愛樂心定金剛地三慧明陀羅尼契經說不定聚眾生多經八萬一千五十劫已訖信心成就決定不退四法門名字契經云復次信樂地位毛頭凡夫經二萬六千劫已訖便信成就無所闕失五清淨三昧契經云若有眾生入難角地修行信心當九萬劫滿足已訖信品成就六金剛陀羅尼契經云信成就量四萬八千六十劫量七大智慧光明契經云復次善男子若有眾生為欲成就功德善根父母天地當經十剎那量已訖即便信地平坦無草八實相本際決定不動契經云信位成就信心發起初剎那中十種信心具足圓滿九文殊師利圓滿因海大總持契經云三阿僧祇大無量劫經過已訖即便信位具足成立十甚深菩提因緣契經云建立信地唯三萬劫十一大方便智善巧契經云信行菩薩九千劫量決定成就清淨信心其思極樂十二菩薩光明遍照契經云爾時金剛慧菩薩摩訶薩即向佛言世尊無上菩提初種子地經幾時節決定淳熟菩提之芽出生增長佛言若為成就初種子地當經七萬五千六十劫初種子地具足建立十三授記平等契經云信心成就非遠非近非無非有非高非下非本非末非去非來非大非小非三世非非三世非位非地非善非惡非是非非是言語道斷心行處滅是故名為真實信心十四如來藏本識契經云爾時地藏菩薩摩訶薩即向佛言世尊云何名為廣大圓滿功德父母信地品耶佛言十信十信十解十信十行十信十向十信十地十信佛地十信乃至具縛惡種子地及一切二乘皆悉十信無量無邊一切諸法無一一法而非十信以此義故名為廣大圓滿信地十五菩薩瓔珞本業契經云信相菩薩於十千劫行十戒法決定安立信成就處如是諸經以何義故如是差別謂眾生心無量無邊各差別故隨其心品說信行相如是不同應審思擇今此文中且依本業解釋而已本曰諸佛菩薩教令發心或以大悲故能自發心或因正法欲滅以護法因緣能自發心論曰此顯示發心因緣門謂已信心成就行者為欲發起第一住心當待緣力而發起故於此文中自有三種一勸請因緣所謂無量無邊一切諸佛及大菩薩眾出現種種勝妙教法契經之海信位行者勸請教化超不定地決定安立不動域故二救度因緣所謂緣無量無邊種種眾生一切苦海以之為因發起金剛不退廣大清淨大慈悲心故三護法因緣所謂諸佛教法欲破滅時以種種方便隨宜隨應隨當隨時隨處不惜身命救護佛法大因緣之力故自能發起金剛不退廣大清淨大久住心故如此可知本曰如是信心成就得發心者入正定聚畢竟不退名住如來種中正因相應論曰此顯示得益位勝門所謂信成就得解行者具足十名無退失故一名為無憂惱人遠離退還墮於凡夫縛煩惱地怖畏心故二名為大富貴人蠲除煩惱之荒穢収藏涅槃之菓故三名為種性高勝人遠離凡夫之下劣種已入如來尊高種性中故四名為手足具人執般若炬遊行法界廣大庭故五名為作大江水人無礙直流入薩波若之大海中故六名為宮殿建立人已超不定決定安住如來家中故七名為真實佛子人遠離凡胎已入聖胎故八名為大福田人出離煩惱獨清淨故九名為徒眾無量人法界眾生皆悉以為自眷屬故十名為無障礙人隨心轉故本曰若有眾生善根微少久遠已來煩惱深厚雖值於佛亦得供養然起人天種子或起二乘種子論曰此舉劣顯勝生解門就此門中即有二門一舉劣顯劣形相門二舉勝顯勝形相門此初門也所謂善根微薄煩惱深厚凡夫眾生雖值摩訶衍之因緣而起小善根種子故本曰設有求大乘者根則不定若進若退論曰此舉勝顯勝形相門所謂若有眾生求摩訶衍甚深微妙法門其心即便不能決定值順因緣怳忽若進遇逆因緣自然若退無定心故若不能定云何名為勝高人耶雖不能定而所望法極勝高故復次望起人天二乘之種子故本曰或有供養諸佛未經一萬劫於中遇緣亦有發心論曰此顯示信心成就無定時解釋十四經之大意焉所謂若有眾生供養諸佛信心成就其時不定或極極遠或極極近或中間故所以者何隨緣有無信熟生故本曰所謂見佛色相而發其心或因供養眾生而發其心或因二乘之人教令發心或學他發心論曰此造作別釋顯示發心因緣之相於此文中即有四種發心因緣一見佛因緣因見如來妙色之身而能發起廣大心故二供養眾僧因緣以種種具供養眾僧因此因緣而能發起廣大心故三慚愧因緣見聞二乘之人教法慚愧其劣因此因緣而能發起廣大心故四隨兼因緣隨他兼心因此因緣而能發起廣大心故本曰如是等發心悉皆不定遇惡因緣或便退失墮二乘地論曰此作其因緣顯示十種信心不定聚形相及總結前所說之十信決擇分焉以何義故十種信品立不定稱所謂若值順當因緣隨向善趣若遇逆違因緣應趣惡道譬如輕毛隨風所吹東西轉故已說第一重二種門次說第二重二種門本曰復次信成就發心者發何等心略說有三種云何為三論曰發何等心者即是發起開問總標門謂發開問總問所為故略說有三種者即是總標總答焉云何為三者即是總舉總問焉本曰一者直心正念真如法故二者深心樂集一切諸善行故三者大悲心欲拔一切眾生苦故論曰此直明顯示答釋廣說門此中有三於此三中初通二利中唯自利後唯利他復次初二唯自利分後一利他復次三皆通二故一正智方便門謂直心為正體智有作方便故二福德具足門謂深心為一切德有住方便故三安樂成就門謂悲心能善救度一切眾生無量苦惱令得安穩廣大樂故本曰問曰上說法界一相佛體無二何故不唯念真如復假求學諸善之行論曰此說發起問答決疑門此門有二一前後相違難問門二開通會釋消難門此即初門謂舉上下二文相違難其差別相故云何相違謂上文中作如是說所言覺義者謂心體離念相離念相者等虗空界無所不遍法界一相即是如來平等法身依此法身說名本覺於下文中作如是說二者深心樂集一切諸善行故上下二文如是相違是故發問此是問辭難其異相應審思擇本曰答曰譬如大摩尼寶體性明淨而有鑛穢之垢若人雖念寶性不以方便種種磨治終無得淨論曰此開通會釋消難門此中有七一正答決斷彼難門二修善行者得益門三修行善巧方便門四顯示發心功德門五簡擇上下顯異門六通契經文決疑門七讚歎發心功德門初門有三一開示譬喻善巧門二合說契當安立門三顯示法說生解門此即初門於中有四一寶喻謂即大摩尼珠寶如是珠寶當有何處如是珠寶當有黃石如是珠寶其色如何謂深黃色其身形相當如何耶謂如方坐無長短故大小之相其量云何謂一丈故如是珠寶諸黃石中皆悉具足無有黃石而無摩尼其止住相次第如何謂第一珠第二黃金第三石體此摩尼珠一丈量者彼諸黃石或有極小或有極大各各差別豈可得言皆遍一切此摩尼珠有殊勝力雖一丈量遍於大中小中無餘無所障礙亦可得說遍一切處於彼石中有此寶故其石色黃應審觀察二性淨喻如是珠寶其體性甚極明白遠離塵累故如本體性明白故三垢染喻如是珠寶能為金石等之所障不能出現明白相故如本而有鑛穢之垢故四人眾喻謂極窮貧極懈怠故不求寶人并及精進樂求寶人故如本若人雖念寶性等故已說開示譬喻善巧門次說合說契當安立門寶喻中言大摩尼珠者當喻本覺佛性故所以者何本覺佛性隱藏眾生相續身中似彼珠故言黃石者當喻一切眾生相續身故所以者何諸眾生身藏褁佛性似彼石故言色黃者當喻彼佛性不變義故所以者何真如佛性堅固不改似彼金故言如方坐無長短者當喻真如法平等無增減故所以者何此真如法一味平等無有差別似彼坐故言一丈者當喻真如法具足圓滿無闕失故所以者何真如法身具足萬德無所闕失似彼丈故言如是珠寶諸黃石中皆悉具足無有黃石而無摩尼者當喻真如性遍諸眾生種種身中無有眾生而無真如本覺性故所以者何此真如性離於不遍似彼珠故言第一珠第二黃金第三石體者當喻俱有次第法漸漸麤現故所以者何從本覺智流轉建立四相海時如其次第漸漸麤現似彼三故言此摩尼珠有殊勝力雖一丈量遍於大中小中無餘者當喻真如本覺有不思議業遍蚊龍等小大身中無妨難故所以者何此真如法其性平等遍凡聖中似彼珠故言於彼石中有此寶故其石色黃者當喻諸眾生悉有本覺有心相故所以者何一切眾生有覺心故有了別識似彼石故次說淨喻合說契當門言如是珠寶其體性甚極明白遠離塵累者當喻性淨本覺清淨明白離垢染故次說染喻合說契當門言如是珠寶能為金石等之所障不能出現明白相者當喻自性清淨心為無明之所隱覆不能出現無漏性德故次說人喻合說契當門言二種人者當喻求佛法寶極精進人極懈怠人如本如是眾生故本曰真如之法體性空淨而有無量煩惱染垢若人雖念真如不以方便種種熏習亦無得淨以垢無量遍一切善法故修一切善行以為對治論曰此顯示法說生解門此中如其次第法說合喻生行者解應審思擇文相明故不須別釋本曰若人修行一切善法自然歸順真如法故論曰此修善行者得益門謂若有眾生斷一切惡修一切善自然自在得真如珠照達無明之闇夜無所疑畏故本曰略說方便有四種云何為四論曰此修行善巧方便門此門有四一者一切修行根本門二制伏惡業不生門三出生善根增長門四誓願無邊平等門本曰一者行根本方便謂觀一切法自性無性離於妄見不住生死觀一切法因緣和合根果不失起於大悲修諸福德攝化眾生不住涅槃以隨順法性無住故論曰此第一門中有二一般若成就無住門所謂觀察一切諸法從本已來不生不滅畢竟寂滅皆無所有不住生死故二大悲成就無住門所謂觀察一切諸法因緣和合故因果不空業報亦有緣無量無邊眾生界之海為究竟取攝不住涅槃故以隨順法性無住故者即是示緣及結兩種不住道行修行法門雖無有量而不住道其最根本是故說言行根本方便焉本曰二者能止方便謂慚愧悔過能止一切惡法不令增長以隨順法性離諸過故論曰此制伏惡業不生門此門為欲顯示行者當發起慚愧等清淨心品防止一切無量惡作漸漸損減不令增長故以隨順法性離諸過故者總結其緣本曰三者發起善根增長方便謂勤供養禮拜三寶讚嘆隨喜勸請諸佛以愛敬三寶淳厚心故信得增長乃能志求無上之道又因佛法僧力所護故能消業障善根不退以隨順法性離癡障故論曰此出生善根增長門此門為欲顯示行者當於一切三寶恭敬供養禮拜讚歎隨喜勸請增長信心消除業障志求無上大菩提故以隨順法性離癡障故者總結其緣本曰四者大願平等方便所謂發願盡於未來化度一切眾生使無有餘皆令究竟無餘涅槃以隨順法性無斷絕故論曰此誓願無邊平等門此門為欲顯示行者當發起十方世界之塵數廣大誓願海修習十方世界之塵數行因海攝取十方世界之塵數眾生海成就十方世界之塵數果滿海一切皆悉無有餘故以隨順法性無斷絕故者總結其緣本曰法性廣大遍一切眾生平等無二不念彼此究竟寂滅故論曰此是顯示隨順殊勝之相以何義故四門結中皆悉通名隨順法性為欲顯示法性虗空其體性廣大圓滿無有邊際其相用無礙自在無有始終修彼四門一切行者亦復如是順順如如其阿世耶廣大圓滿無分際故本曰菩薩發是心故則得少分見於法身以見法身故隨其願力能現八種利益眾生所謂從兜率天退入胎住胎出胎出家成道轉法輪入於涅槃論曰顯示發心功德門此文為欲顯示初發心住菩薩起隨順法界性中廣大圓滿心故相似觀智見法性身見法性身故願力自在由願力故緣無量無邊法界之眾生而起大悲心由大悲心極甚深故出現八種安樂化相隨時隨處隨宜隨應順順如如利益安樂故本曰然是菩薩未名法身以其過去無量世來有漏之業未能決斷隨其所生與微細苦相應亦非業繫以有大願自在力故論曰此簡擇上下顯異門此中有二一簡異地上門謂發心住菩薩唯名幻化影相身不得名為真如法身菩薩故所以者何此菩薩無始餘業猶未出離隨受生處與微細苦相應不離地上菩薩此相違故言簡異具縛門所謂初發心住菩薩無繫縛俱轉業因相無繫縛受生果報故所以者何大願方便具足轉故本曰如修多羅中或說有退墮惡趣者非其實退但為初學菩薩未入正位而懈怠者恐怖勇猛故論曰此通契經文決疑門此有五種有說契經一文殊師利歡喜陀羅尼契經說爾時文殊師利即白佛言世尊常大眾中唱如是言五十種子心莊嚴果海行因之本一切行者當經此道成等正覺如是五十種子心中幾是退分幾是定分唯願世尊為我解說於是世尊即告文殊師利菩薩言諦聽諦聽善思念之我今為汝分別解說善男子十種真地名為金剛波若住地前四十心名為頗梨珠隨轉迴向地汝當應如是知應如是觀今此經文為欲顯示大士十地已真證域名不退分自此以前四十種心未得證知名為退分故二本覺大悲自然熏習契經說復次佛子汝前所問云何名為節退相者此事殊勝不思議中不思議故愚癡凡夫初發意菩薩等之所不能知爾時大明菩薩至心勸請佛即告大明言善男子言節退相者謂信心發心住淨心地金剛心此之四處皆名退分為彼中間皆名為不退分是故說言節退相焉今此經文為欲顯示佛法大海廣大圓滿無邊際故三大證得陀羅尼契經說十種安心決定不退無退失理今此經文為欲顯示十住菩薩發起隨順法界性中廣大善根故決定安住金剛位故四五明契經云十種定心非退悲進非來非去非出非入圓滿萬德無所闕失是故說言自然住心今此經文為欲顯示十住位中果德已滿更無所進復無所退自然常住無闕事故五菩薩瓔珞大本業契經說諸善男子若一劫二劫乃至十劫修行十信得入十住是人爾時從初一住乃至第六住中若修第六般若波羅蜜正觀現在前復值諸佛菩薩知識所護出到第七住常住不退自此七住已前名為退分今此經文為欲顯示勸䇿下劣懈怠眾生為令增長勇猛心故今此論中且據本業而作會通應審觀察本曰又是菩薩一發心後遠離怯弱畢竟不畏墮二乘地若聞無量無邊阿僧祇劫勤苦難行乃至得涅槃亦不怯弱論曰此讚歎發心功德門此門為欲顯示發心菩薩遠離二怖畏其心決定不動故一下生怖畏生下劣道極怖畏故二上生怖畏聞殊勝境其心怯弱極怖畏故離此二怖是故名為發心功德本曰以信知一切法從本已來自涅槃故論曰即是總結二種功德之因緣焉自此已下種種諸門文相明故論無文釋旨深智淺學者難就輙以課虗略散文耳本曰解行發心者當知轉勝以是菩薩從初正信已來於第一阿僧祇劫將欲滿故於真如法中深解現前所修離相論曰此有二門一簡前異後二離過修行此即初門從初正信者位在十住初心超不定聚入種性地故名正信異前位故名深不同後證故名解此位即當十行十向本曰以知法性體無慳貪故隨順修行檀波羅蜜以知法性無染離五欲過故隨順修行尸波羅蜜以知法性無苦離嗔惱故隨順修行羼提波羅蜜以知法性無身心相離懈怠故隨順修行毗梨耶波羅蜜以知法性常定體無亂故隨順修行禪波羅蜜以知法性體明離無明故隨順修行般若波羅蜜論曰此明離過修行以知法性無慳者顯上深解現前隨順等者顯上所修離相十行已去得法空故能順法界修六度行以順如故本曰證發心者從淨心地乃至菩薩究竟地論曰此有二門一通明諸地二別顯成滿初門有即初標位地分別二障盡故名淨心即初地名也第十地終因圓滿故名究竟也本曰證何境界所謂真如以依轉識說為境界而此證者無有境界唯真如智名為法身論曰此明證相所謂本智證十真如也轉識是見分對此見分故名真如以為境界直依證智即無能所故云唯真如智名為法身也本曰是菩薩於一念頃能至十方無餘世界供養諸佛請轉法輪唯為開導利益眾生不依文字論曰此即後得智於中有四此初攝法上首若據報得初地菩薩得百佛世界今據願力故云無餘餘地准此正智證如已是自利故今供佛請法唯為利他菩薩利生非唯一途故維摩經云或示老病死成就諸群生無數億眾生俱來請菩薩一時到其舍化令向佛道經書禁呪術工巧諸伎藝盡現行此事饒益諸群生有如是等無量方便利益非謂要須供佛請法聽受傳持故云不依文字也本曰或示超地速成正覺以為怯弱眾生故或說或於無量阿僧祇劫當成佛道以為懈慢眾生故能示如是無數方便不可思議論曰此隨根近但無數方便等者此結前不依文字也本曰而實菩薩種性根等發心則等所證亦等無有超過之法以一切菩薩皆經三阿僧祇劫故論曰此實行不殊謂六種性三品根三種發心所證十如此等無有超過之法以一切下結時等也本曰但隨眾生世界不同有所見聞根欲性異故示所行亦有差別論曰此應機緣用眾生者謂六道也世界謂淨穢不同上中下根欲謂樂廣略性謂三乘種性隨如此等應見何身應聞何法故示所行有差別耳本曰又是菩薩發心相者有三種心微細之相云何為三一者真心無分別故二者方便心自然遍行利眾生故三者業識心微細起滅故論曰此明發心相於中有二一還源始覺謂前二心二下轉本覺則後一心由此二覺內外熏力速超自分故標三心為發心相耳明此本始行相難知故云微細之相也次散說三心謂一真見道名為真心即根本智體會一如離於二取名無分別也後得智中施設權巧名方便心既先自利法爾利他故名自然也大悲普濟名為遍行所言業者即是業相所言識者謂轉等諸識所言心者即業等諸識內本覺淨心故名業識心謂真妄和合為諸識體即是淨分為發心德如上文云二者意熏習謂諸菩薩發心勇猛速趣涅槃故前文言意即十一末那此云業識義亦具矣由諸識內本覺淨分其力轉盛是故能令菩薩速起勝進趣於果位非謂無明癡分故云微細起滅也復次本覺力轉勝無明用漸漸微也本曰又是菩薩功德成滿於色究竟處示一切世間最高大身謂以一念相應慧無明頓盡名一切種智自然而有不思議業能現十方利益眾生論曰此別顯功德成滿色究竟處者是第四禪第也楞伽經云欲界及無色佛不彼成道色界中天欲中得道即是報佛他受用身示離欲貪故故不居欲界現無邊相好故不居無色界為離二過故依色界上天成等正覺也謂始覺智一剎那頃會大覺時名一念相應慧也即於此時無明盡故領照一切眾生之心名一切種智月去重雲俱現千器無思而應糸一方故云自然而有不思議業能現十方等此是化身業用良以從報化故也本曰問曰虗空無邊故世界無邊世界無邊故眾生無邊眾生無邊故心行差別亦復無邊如是境界不可分齊難知難解若無明斷無有心想云何能了名一切種智論曰此問答釋疑門有二一難問門二答說門此初門也問意云世界眾生心行如是境界皆依一無明妄心而得住持若無明斷即自空無所了之境既無云何得有能了之智名一切種耶復次占察經云一切境界皆依無明識夢所見妄想作故若無明斷即無心相心相既無誰為能了名一切智耶復次若一行者斷無明時能了一切有情心行名一切種智者此亦爾豈一室之明燈能破十室之夜闇能了十室之境哉本曰答曰一切境界本來一心離於想念論曰此答初問一切境界從本已來唯依一種無明心有以無明滅故境界亦滅以境界滅故即無能斷始覺之智以此境智無有俱故如大總持經云悟四相品云始覺般若有四相位中有無四相時始覺隨無即是其義云離於想念者正顯離相境智即是離於四相妄想及離始覺正念唯有本覺獨存等照總機是故得名一切種智如上文云而實無有始覺之異以四相俱時而有皆無自立本來平等同一覺故即此義也本曰以眾生妄見境界故心有分齊以妄起想念不稱法性故不能了論曰此答第二問等覺以還未離無始無明念故名為眾生見有染淨斷證境智者皆是無明識夢所見故云妄見境界心有分齊也以起想念等者以起境想覺念即即不稱法性故不能了今妙覺位如眠夢覺始智見有惑智所有修證皆是夢中所見無有真實故圓覺經云又如夢中人醒時不可得覺者如虗空平等不動轉覺遍十方界即得成佛道眾幻滅無處成道亦無得本性圓滿故如是了時故名一切種智本曰諸佛如來離於見想無所不遍心真實故即是諸法之性自體顯照一切妄法有大智用無量方便隨諸眾生所應得解皆能開示種種法義是故得名一切種智論曰此答第三問明諸佛如來已斷無明故離二見妄想也智周法界故無所不遍體會心源名為真實緣起永息是法實性本非他成曰自眾德所依名體其如塵鏡垢盡萬像中顯夜過日出圓光普照故云自體照一切妄法有大智用乃至得名一切種智也本曰問曰若諸佛有自然業能現一切處利益眾生一切眾生若見其身若覩神變若聞其說無不得利云何世間多不能見論曰此因論生論也因前自然有不思議及業有無量方便等生起此文於中有二一問二答初門可智也本曰答曰諸佛如來法身平等遍一切處無有作意故說自然但依眾生心現眾生心者猶如於鏡鏡若有垢色像不現如是眾生心若有垢法身不現故論曰此答釋中云平等遍一切處者明此法身量等十方化遍六道有感必應故云但依眾生心現也有垢不現者喻無感佛之機也如水中月質影俱月眾生心現化名法也
