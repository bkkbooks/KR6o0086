body:
  text: 本曰問曰若如是義者諸眾生等云何隨順而能得入論曰此說發起問答決疑門此生疑致問問者依何等句發何等疑所謂依不可說不可念句故發難隨順之疑依第二傳言故發難得入之疑於是隨順之句直疑其因得入之句直疑其果所以者何善巧言說生長聞慧隨順方便聞所成慧生長思慧隨順方便思所成慧生長修慧隨順方便一切善教極於言說一切三慧盡於念法若無言說則無三慧若無三慧則無萬行而真如法不可說故無有言教不可念故則無三慧無三慧故無以成就十地萬行諸眾生等以何為依漸漸進修如是疑故作問而言云何隨順行因能起果德所起若無起因則無能入若無能入不得所入能入謂金剛心所入謂金剛地而已以無因以何為門證入於如來薩波若海中如是疑故作問而言而能得入如是二問依生滅門疑真如門謂有眾生作如是疑如生滅門中斷一切惡修一切善備足因行圓滿果德真如門中亦復如是豈不可說撥加行善不可念誹五等位今舉此意發起疑問本曰答曰若知一切法雖說無有能說可說雖念亦無能念可念是名隨順若離說念名為得入論曰如其次第決彼二疑所謂隨順自有二種一生滅隨順二真如隨順生滅隨順中有二種一向上隨順謂從信乃至金剛能為菩薩果隨順方便故二向下隨順謂從自性淨妙藏乃至第一念信能為耶耶地隨順方便故所言向上隨順者因無常音聲言說生長無常之聞慧因無常之聞慧生長無常之思慧因無常之思慧生長無常之修慧生長無常之行德是名向上所言向下隨順者因常之行德生長常之修慧因常之修慧生長常之思慧因常之思慧生長常之聞慧因常之聞慧生長常之言說是名向下如是二門同時具足無有前後障智別相至於文處自當顯說真如門中作如是說不可說者以無有常無常之音聲言說故不可念者以無有常無常之三慧故非無自門之言說及念作如是說不可說不可念以此義故不可以異門難異門此有故彼有彼有故此有若爾真如門中言說及念何等相耶謂有言說非常音聲非無常音聲謂無能說可說如如如說復次有念非常三慧非無常三慧謂無能念可念寂滅寂靜念所以者何真如門中無有往向雜亂住故云何名為真如隨順謂若知一切法雖說無有常說說無常說說無能說說可無說說是名為隨順於真如音聲若與此相違是名為顛倒於真如音聲復次若知一切法雖念無常慧念無無常慧念無能念念無可念念是名為隨順於寂滅寂靜念若與此相違是名為顛倒於寂滅寂靜念已說隨順相次決得入疑此中有二一生滅得入於中有二一向上得入則金金剛地二向下得入則耶耶地須隨順句應審觀察二真如得入則自所依以何得入謂是雜住云何得入謂離說念離何等說念耶謂真如門俱非言說及俱非念是故說言若離說念名為得入第一傳言得成就故第二傳疑決斷理明已說發起問答決疑門本曰復次真如者依言說分別有二種義云何為二一者如實空以能究竟顯實故二者如實不空以有自體具足無漏性功德故論曰此假說開相真如門此中有二門一如實空真如門謂如如體中過於恒沙一切染法皆悉空空無所有故二如實不空真如門謂如如體中過於恒沙一切淨法皆悉具足無所少故如是二門隨一一具不相捨離本曰所言空者從本已來一切染法不相應故謂離一切法差別之相以虛妄心念故當知真如自性非有相非無相非非有相非非無相非有無俱相非一相非異相非非一相非非異相非一異俱相乃至總說依一切眾生以有妄心念念分別皆不相應故說為空若離妄心實無可空故論曰於此應誦理玄頌言如彼頌言遠離三假相圓滿三實德以此因緣故建立體真如遠離四句相圓滿四法德以此因緣故建立相真如一切過患行三四相為本一切功德品三四德為本以此因緣故不增亦不減止於數量品作如是安立今誦此頌本應持真如門本曰所言不空者以顯法體空無妄故即是真心常恒不變淨法滿足則名不空亦無有相可取以離念境界唯證相應故論曰以離念境界唯證相應故者亂住證非往向證本曰心生滅者依如來藏故有生滅心論曰此說心生滅門此中有二門一所依總相門二能依別相門此中有二重住思應觀察生滅門中一心為依生滅門攝覺義不覺義梨耶為依故此說初門心生滅者者唱上立故依如來藏故者所依一心彼多一心亦名生滅門故今當依經如來藏門分明顯示如來之藏其數幾有今如來藏何所攝頌言如來藏有十契經異說故此中如來藏與行與相攝論曰如來藏有十種於契經中別別說故一大總持如來藏盡攝一切如來藏故諸佛無盡藏契經云佛告文殊師利有如來藏名曰大寶無盡殊勝圓滿陀羅尼盡攝諸藏無所不通無所不當圓滿圓滿平等平等一切所有諸如來藏無有以此非為根本何以故此如來藏如來藏王如來藏主如來藏天如來藏地以此義故名曰大寶無盡殊勝圓滿陀羅尼如來藏故此經文明何義所謂顯示陀羅尼藏所依總相餘契經中諸如來藏能依別相故以何義故名如來藏謂攝持故二遠轉遠縛如來藏一清一滿故實際契經云如來藏者唯有覺者唯有如如離流轉因離慮知縛一一白白是故名為如來之藏故此經文明何義所謂顯示真如無有惑因無有覺因無有惑果無有覺果一真一如唯有淨妙如來體故以何義故名如來藏謂無雜故三與行與相如來藏與流轉力法身如來令覆藏故楞伽契經云如來藏者為善不善因受苦樂與因俱若生若滅猶如妓兒故此經文明何義所謂顯示生滅於惑與力於覺與力出現生死涅槃之法譬如作幻幻人於諸幻事隨其所應與力用故以何義故名如來藏謂令覆故四真如真如如來藏唯有如如故真修契經云如理如理如來藏非建立非誹謗非常非無常非正體智之所證得亦非意意識所緣境界何以故唯有理理無彼彼故此經文明何義所謂顯示真如門中性真如理唯理自理非智自理故以何義故名如來藏謂無他故五生滅真如如來藏不生不滅被生滅之染故楞伽契經說大慧愚痴凡夫不覺不知執著諸法剎那不住墮在邪見而作是言無漏之法亦剎那不住破非真如如來藏故復次大慧金剛如來藏如來證法非剎那不住大慧如來證法若剎那不住者一切聖人不成聖人故此經文明何義所謂生滅門中性真如理遠離無常之相不生不滅之法故以何義故名如來藏謂被染故六空如來藏一切諸空覆藏如來故勝鬘經云世尊空如來藏若離若脫若異一切煩惱藏故此經文明何義所謂顯示生滅門中一切染法隱覆自相本覺無量性功德故以何義故一切染法總名為空所謂一切染法幻化差別體相無實作用非真故名為空而能隱覆法身如來實德真真體是故名為如來之藏從能藏染立其名故七不空如來藏一切不空被空染故勝鬘經說世尊不空如來藏過恒沙不離不脫不異不思議佛法故此經文明何義所謂顯示生滅門中自相本覺備過恒沙一切功德被過恒沙一切染法之所染故以何義故一切淨法總名不空所謂一切淨法自體中實作用勝妙遠離虗假超越巧偽故名不空被染之覆名如來藏於出現時名為法身隱覆時名如來藏故從所藏淨立其名故八能攝如來藏無明藏中自性淨心能攝諸功德故不增不減契經說如來藏本際相應體及清淨法此法如實不虗妄不離不脫智不思議佛法無始本際來有此此清淨相應法體故此經文明何義所謂顯示一切諸眾生自性清淨心中從無始已來具足三智圓滿四德無所闕失故以何義故名如來藏由顛倒心不知不覺故從能所成立其名故九所攝如來藏一切染法無明地藏既乃出離圓滿覺者為所攝故不增不減經說如來藏本際不相應體及煩惱纏不清淨法此本際離脫不相應煩惱纏不清淨法唯有如來菩提智之所能斷故此經文明何義所謂顯示始覺滿佛斷一切染法智所攝持故以何義故名如來藏謂攝持故十隱覆如來藏法身如來煩惱總所覆隱沒藏故不增不減經說如來藏未來際平等恒及有法則是一切諸法根本備一切法具一切法於世法中不離不脫故此經文明何義所謂顯示多一心體等於法界遍於三際具足圓滿染淨諸法無所不通不無所不至故復次顯示隨緣門中自性淨心於染法中隱藏沈沒法身如來未出現故如來十中今如來藏與行與相本曰所謂不生滅與生滅和合非一非異名為阿梨耶識論曰此說阿梨耶識門略去分名建立滿名雖義具足言未足故此中所說不生不滅及與生滅各何等法分際云何頌曰總攝諸無為名為不生滅總攝諸有為故名為生滅論曰總攝一切無為法故是故名為不生不滅不滅諸無為法之總相故總攝一切有為法故故名為生滅生滅之言諸有為法之總相故如是有為無為二法各有幾數何等名字頌曰無為雖無量略說有四種謂真如本覺始覺與虗空有為雖無量略說有五種謂根本無明及與四相品論曰無為法有四種一真如無為二本覺無為三始覺無為四虗空無為有為法有五種一根本無明有為二生相有為三住相有為四異相有為五滅相有為且四無為以何為體有何等用頌曰依各有二種所謂通及別如體用亦爾隨釋應觀察論曰此四無為各有二依一通所依非有為非無為一心本法以為體故二別所依生滅門內寂靜理法以為體故本覺無為別所依生滅門內自然本智以為體故始覺無為別所依生滅門內隨他起智以為體故虗空無為別所依生滅門內無所有事以為體故復次真如無為有二種用一通用一切諸法令出生故二別用平等之性令不失故本覺無為有二種用一通用不守自性故二別用不轉變故始覺無為用二種用一通用隨妄轉故二別用對治自過故虗空無為有二種用一通用欲有令有故二別用空無之性令不失故此中所說通謂他義別謂自義依此二言應廣觀察種種別相至於文處自當顯說五種有為以何為體有何等用頌曰依各有二種所謂通及別如體用亦爾隨釋應觀察論曰五種有為各有二依通以非有為非無為一心本法以為體故二別依根本無明別所依生滅門內大力住地以為體故生相有為別依生滅門內麤分染法以為體故滅相有為別依生滅門內麤分染法以為體故復次根本無明有二種用一通能生一切諸染法故二別用隨所至處作礙事故生相有為有二種用一通用於上下中與其力故二別用隨所至處作礙事故如說生相住異亦爾滅相有為有二種用一通用於上及自與其力故二別用能作礙事故種種別相至於文處自當顯說以何義故作如是說有為無為一切諸法涌為一心而為其體故於契經中如是說故謂道智經云爾時文殊師利白佛言世尊阿梨耶識具一切法備一切法過於恒沙如是諸法以誰為本生於阿處佛言如是有為無為一切諸法生處殊勝不可思議何以故於非有為非無為處是有為無為法而能生故文殊師利又白佛言世尊云何名為非有為非無為處佛言非有為非無為者所謂即是一心本法非有為故能作有為非無為故能作無為是故我言生處殊勝不可思議復次善男子譬如庶子有二所依一大王二父母有為無為一切諸法亦復如是各有二依謂通達依及支分依復次善男子譬如一切草木有二所依一大地二種子有為無為一切諸法亦復如是各有二依謂通達依及支分依乃至廣說故與和合者即是開示能熏所熏之差別故云何開示所謂顯示染淨諸法有力無力互有勝劣故今當作二門分明顯說一下轉門二上轉門生滅門中不出此二如是二門云何差別頌曰諸染法有力諸淨法無力背本下下轉名為下轉門諸淨法有力諸染法無力向原上上轉名為上轉門論曰由染淨諸法互有勝劣故二種轉門得成而已今當先說初下轉門根本無明以何等法而為所熏於何時中而作熏事頌曰所熏有五種謂一法界心及四種無為非初非中後取初中後故如契經明說論曰根本無明以五種法而為所熏謂一法界及四無為熏一法界其相云何頌曰一種法界心有二種自在謂有為有為是根本無明依於初自在而能作熏事論曰一法界心有二種自在一有為自在能為有為法而作依止故二無為自在能為無為法而作依止故根本無明依初自在能作熏事非後自在中實契經說根本無明熏自所依分際之量非他所依故熏真如法其相云何頌曰真如無為法有二種作用所謂通及別如前決擇說是根本無明依於初作用而能作熏事餘無為亦爾論曰真如無為有二種用謂通及別如前所說根本無明依初作用能作熏事非後作用如說真如餘三無為亦復如是皆依初用非後用故根本無明作熏事時量非初亦非中後取初中後故本智契經說大力無明作熏事時初及中後一時具取而非別取故此中所說能熏所熏以何義故名言為熏謂能引彼法而合自體不相捨離俱行俱轉故名能熏又能彼法不作障礙若隨若順不逆違故名為所熏謂五有為能熏四種無為法及一法界心所熏五法隨來而與五能熏共會和合同事俱轉是故說言不生不滅與生滅和合如大無明一心本法為通依故依初自在作熏習事四相有為應如是知如大無明依四無為通達作用能作熏事四相有為應如是知如是等義至自決擇其理分明非一非異者即是開示有為無為同異差別故所謂為欲顯示一法界心無為自在四種無為別事作用與一法界心有為自在四種無為通達作用不同理故名為非一為欲顯示受能熏染一法界心有為自在四種無為通達作用與能熏事五種有為不異理故名為非異復次所熏淨法與能熏染法各差別故名為非一能熏所熏俱一心作無有他故名為非異名為阿梨耶識者總結圓滿字已說下轉門次說上轉門若欲成立此上轉門更應安置經本之辭所謂楞伽王契經說爾時世尊告大眾言諸佛子我念往昔於出時中我來依他於入時中他來依我故此經文明何義謂顯示二轉故云何顯示謂於出時中我來依他者即是下轉於入時中他來依我者即是上轉此義云何我謂則是真如本覺如來藏佛故來謂受熏之義故依他者背自本體依無明他故依此經文作解釋故是故說言不生不滅與生滅和合即是下轉門若欲成立上轉門者可言生滅與不生不滅和合以此義故玄理論中則存斯詞馬鳴菩薩本阿世耶比來次第分明顯了舉一兼一影示而已是故無有𨷂失過咎上轉門義於對治分其理自明已說上轉門次說該攝安立門諸識差別其數幾有何等契經中各說幾種識頌曰牟尼大覺尊一代聖說中總集有十種各異說契經謂一種為始十種而為終歸本等契經分明顯說故論曰凡集一代時教總有十種謂從一種識乃至十種識云何為十種識差別經一立一種識總攝諸識此中有四一立一切一心識總攝諸識所謂以一心識遍於二種自在無所不安立故一心法契經說爾時文殊師利承佛威神之力即白佛言世尊說幾種識體相如何當願為我分別開示爾時世尊告文殊言善哉善哉文殊師利為諸大眾當問此事諦聽諦聽善思念之我當為汝分別解說於是文殊白佛言善哉世尊願樂欲聞佛告文殊言我唯建立一種識所餘之識非建立焉所以者何一種識者多一一識此識有種種力能作一切種種名字而唯一識終無餘法是故我說建立一種識所餘之識非建立焉二立阿梨耶識總攝諸識所謂以阿梨耶識具足障礙義無障礙義無所不攝故阿梨耶識契經云爾時觀自在菩薩即白佛言世尊云何名為通達總相識以何義故名為總相佛告觀自在菩薩言通達總相識者即是阿梨耶識此識有礙事及非礙事具一切法備一切法譬如大海為水波等作總相名以此義故名總相三立末那識總攝諸識所謂以末那識具足十一種義無所不攝故顯了契經云種種心識雖有無量唯末那轉無有餘法所以者何是末那識具足十一種義無所不作故四立一意識總攝諸識所謂以意識有七種轉變自在隨能依其事故七化契經云譬如幻師唯是一人以幻術力變化七人愚人見之謂有七人而智者見唯有一人無餘七人意識幻師亦復如是唯是一識能作七事凡夫見之謂有七事而覺者之唯有意識無餘七事故是名建立同一種識四種契經二立二種識總攝諸識一阿梨耶識二意識阿梨耶識者總舉業轉現三識故意識者總舉七種轉識故楞伽契經云大慧廣說有八種識略說有二種何等為二一了別識二分別事識乃至廣說故三立三種識總攝諸識一阿梨耶識二末那識三意識阿梨耶識總舉三相識故末那識者直意根故意識者總舉六種轉識故慈雲契經云復次敬首廣說有十種識總說有三種識一細相性識二根相性識三分離識乃至廣說故四立四種識總攝諸識三分離識乃至廣說故四立四種識總攝諸識謂前三中加一心識故無相契經說識法雖無量不出四種識一所依本一識二能依持藏識三意持識四遍分別識乃至廣說故五立五種識總攝諸識謂前四中加隨順遍轉識故大無量契經云復次有識非彼彼識攝遍於彼彼識所謂隨順遍轉識故六立六種識總攝諸識所謂眼等五種別識及第六意識故四聖諦契經說佛告樹王我為小根諸眾生故以密意趣作如是唱但有六識無有餘識而實本意為欲令知六種識中具一切識於大眾中作如是唱故七立七種識總攝諸識謂前六中加末那識故法門契經說復次文殊師利識法有七種云何為七所謂六識身及末那識如是七種或一時轉或前後轉復次第七識有殊勝力故或時造作持藏之用或時造作分別之依故八立八種識總攝諸識謂前七中加阿梨耶識故道智契經說心王有八一眼識心王乃至八者異熟報識心王種種識法不出此數故九立九種識總攝諸識謂前八識中加唵摩羅識故金剛三昧契經說爾時無住菩薩而白佛言尊者以何利轉而轉眾生一切情識入唵摩羅佛言諸佛如來常以一覺而轉諸識入唵摩羅故十立十種識總攝諸識謂前九中加一切一心識故法門契經云心量雖無量而不出十識乃至廣說故如是十種於寶𠕋中云何該攝云何安立頌曰於本體雖明今更作重釋將契經散文屬斯論總言論曰於本論中雖分明說而今為鈍根更作重釋將契經文屬當論言所謂一心法契經中總所建立阿梨耶識摩訶衍論總阿梨耶識攝所以者何於本論中作如是說所謂不生不滅與生滅和合非一非異名為阿梨耶識此識有二種義能攝一切法生一切法云何為二一者覺義二者不覺義故顯了契經中總所建立大末那識摩訶衍論總末那攝所以者何於本論中作如是說復次生滅因緣者所謂眾生依心意意識轉故此義云何以依阿梨耶識說有無明不覺而起能見能現能取境界起念相續故說為意此意復有五種名云何為五一名為業識謂無明力不覺心動故二名為轉識依於動心能見相故三名為現識所謂能現一切境界猶明鏡現於色像現識亦爾隨其五塵對至即現無有前後以一切時任運而起常在前故四名為智識謂分別染淨法故五名為相續識以念相應不斷故乃至廣說故七化契經中總所建立同一意識摩訶衍論一分意識攝說相雖𨷂具密意故於本論中作如是說復次意識者此即相續識依諸凡夫取著轉深計我我所種種妄執隨事攀緣分別六塵名為意識乃至廣說故如是如是彼彼諸經隨應當處應如是配已說該攝安立門次說藏識剖字門阿梨耶識名字差別其數幾有契經異說其相云何何等字義屬當何處論曰阿梨耶總有十種所以者何於契經中別別說故一名為大攝主阿梨耶識所謂即是大總相識義如前說二名為根本無明阿梨耶識所謂根本無明別立以為阿梨耶識故十種妄想經云剎闍只多提王識直是妄法不能了達一法界體一切染法阿梨耶以為根本出生增長無斷絕時若無提王識黑品眷屬永無所依不能生長故此阿梨耶識當何決擇攝於本論云所言不覺義者謂不如實知真如法一故不覺心起而有其念乃至廣說故三名為清淨本覺阿梨耶識所謂自然本智別立以為阿梨耶識故本覺契經說自體淨佛阿梨耶識具足無漏圓滿功德常恒清淨常恒決定無受熏相無變異相智體不動具足白品是故名為獨一淨識故此阿梨耶識者何決擇攝於本論云復次覺體相者有四種大義與虗空等猶如淨鏡乃至廣說故四名為染淨本覺阿梨耶識所謂不守自性陀羅尼智別立以為阿梨耶故本因緣起契經說爾時光嚴童子即白佛言尊者以何因緣故難入未曾有會中作如是言隨他緣起陀羅尼智於是尊者告光嚴童子言此楞伽王常在大海摩羅山中卛十萬六千鬼神眾以為眷屬如是諸眷屬乘華宮殿遊於諸剎皆悉承賴彼楞伽王方得遊行所謂鬼神眾作如是言我等神眾無有威德無有氣力於諸所作皆無有其能如宜大王我等眾中與堪能力彼楞伽王即隨其時與殊勝力不相捨離而共俱轉謂楞伽王雖非分身而能遍滿諸神眾中各各令得全身之量於一切時於一切處共轉不離不守自性智亦復如是能受一切無量無邊煩惱染法鬼神眾熏不相捨離而俱轉故以此因緣故我難入中作如是說隨轉覺智名為楞伽王識故此阿梨耶識當何決擇攝於本論云自性清淨心因無明風動心與無明俱無形相不相捨離乃至廣說五名為業相阿梨耶識所謂根本業相及與業識別立以為阿梨耶故本性智經說阿梨耶識無能了作無所了作不可分折不可隔別唯由精動隱流義故名為鍵摩故此阿梨耶識當何決擇攝於本論云復次依不覺故生三種相與彼不覺相應不離云何為三一無明業相以依不覺故心動說名為業覺則不動動則有苦果不離因故六名為轉相識阿梨耶識所謂能見境界之相及與轉識別立以為阿梨耶故大無量契經說阿梨耶識有見見轉無見見起故此阿梨耶識當何決擇攝於本論云二者能見相以依動故能見不動則無見故七名為現相識阿梨耶識所謂境界之相及於現識別立以為阿梨耶識故實際契經說別異現前地轉相異相異具足行轉是故名為阿梨耶識復次此阿梨耶識者直是異熟無記之法淨白相故或名成就故此阿梨耶識當何決擇於本論云三者境界相以依能見故境界妄現離見則無境界故八名為性真如理阿梨耶識所謂正智所證清淨真如別立以為阿梨耶識故此阿梨耶識當何決擇攝所謂清淨般若質境真如攝故九名為清淨始覺阿梨耶識所謂本有清白始覺般若別立以為阿梨耶故果圓滿經云佛告樹王言自然始覺阿梨耶識當常不離清淨本覺清淨本覺當常不離始覺淨識隨是彼有隨彼是有或非同種或非異種故此阿梨耶識者何決擇攝於本論中本覺義者對始覺說以始覺者即同本覺故十名為染淨始覺阿梨耶識所謂隨緣始覺般若別立以為阿梨耶識故果圓滿契經說復次樹王如始覺淨識及白淨本覺說染淨始覺阿梨耶識不守自性緣起本覺亦復如是故此阿梨耶識當何決擇攝於本論云依本覺故而有不覺依不覺故說有始覺又以覺心原故名究竟覺不覺心原故非究竟覺乃至廣說故如是等義至自決擇自當備演十種末那六種意識於後文中隨次釋故今略而已已說藏識剖字分相門本曰此識有二種義能攝一切法生一切法云何為二一者覺義二者不覺義論曰此總識攝生圓滿分門謂總顯示大識殊勝圓滿相故此義云何所謂具足二種圓滿故一功德圓滿謂覺義字句能攝一切無量無邊過於恒沙不離不斷諸功德故能生一切無量無邊過於恒沙不離不斷諸功德故二過患圓滿謂不覺義字句能攝一切無量無邊過於恒沙若離若脫諸過患故能生一切無量無邊過於恒沙若離若脫諸過患故如是種種攝生熏習差別之相至彼別相決擇分中分明顯示本曰所言覺義者謂心體離念相離念相者等虗空界無所不遍法界一相即是如來平等法身依此法身說名本覺論曰於此文中即有二門一略說本覺安立門二略說始覺安立門本覺門中即有二門一清淨本覺門本有法身從無始來具足圓滿過恒沙德常明淨故二染淨本覺門自性淨心受無明熏流轉生死無斷絕故二略說始覺門有二門一清淨始覺門無漏性智出離一切無量無明不受一切無明熏故二染淨始覺門般若受無明熏不能離故如是諸覺皆智眷屬當證何理以為體分謂性真如及虗空理如是二理各有幾種各有二種故云何名為二種真如一清淨真如二染淨真如虗空之理亦復如是云何名為清淨真如二種淨覺所證真如離熏習故云何名為染淨真如二染淨覺所證真如不離熏故虗空之理亦復如是以何義故強名本覺字事差別其相云何頌曰本覺各有十體雖同字事各各差別故謂根明等義論曰本覺各十云何十本一根本事本本有法身能善住一切功德譬如樹根能善住持一切枝葉及華果等不壞失故二本字事本本有法身從無始來自然性有不始起故三遠字事本本有法身其有德時重重久遠無分界故四自字事本本有法身我自成我非他自成我故五體自事本本有法身為諸枝德作依止故六性字事本本有法身不轉之義常建立故七住字事本本有法身住於無住無來無去來故八常字事本本有法身決定實際無流轉故九堅字事本本有法身遠離風相堅固不動若金剛故十總字事本本有法身廣大圓滿無所不遍為通體故云何十覺一鏡字事覺薩般若慧清淨明白無塵累故二開字事覺薩般若慧通達顯了無障礙故三一字事覺薩般若慧獨尊獨一無比量故四離字事覺薩般若慧自性解脫出離一切種種縛故五滿字事覺薩般若慧具足無量種種功德無所少故六照字事覺薩般若慧放大光明遍照一切無量境界故七察字事覺薩般若慧常恒分明無迷亂故八顯字事覺薩般若慧清淨體中淨品眷屬悉現前故九知字事覺薩般若慧於一切法無不窮故十覺字事覺薩般若慧所有功德唯有覺照無一一法而非覺故如是十種本覺字義唯依一種大性法身隨義異釋據其自體無別而已此中所說二本覺中當何本覺謂清淨本覺非染淨本覺字義差別其相云何頌曰染淨本覺中或各有十義前說十事中各有離性故論曰此本覺中或各有十所以者何前十義中各有不守自性義故自可配屬依向應知如是二覺同耶異耶非同同故非異異故以此義故或同或異或非是同或非是異是故皆是皆非而已以何義故強名始覺字事差別其相云何頌曰從無始已來無有或亂時今日始初覺故名為始覺論曰從無始來始覺般若無惑亂時而無惑時今始初覺故名始覺如是始覺前惑後覺即非始覺而無惑時理常今常初故名為始覺如是二始覺中當何覺耶謂清淨覺非染淨覺字義差別其相云何頌曰清淨始覺智不守自性故而能受染熏故名染淨覺論曰清淨始覺雖無惑時而不守自性故能受染熏隨緣流轉以此義故是故名為染淨始覺以何義故強名真如字事差別其相云何頌曰性真如理體平等平等一無有一多相故名為真如論曰性真如理平等平等唯同一相亦無一相亦無多相無一相故遠離同緣無他相故遠離異緣以此義故名為真如如是真如二種淨智親所內證復次真如各有十義云何為十真一根字事真乃至第十總字事真如是十真十種本義相應俱有不相捨離是故同名表示而已云何十如一鏡字事如乃至第十覺字事如如是十如十種覺義相應俱有不相捨離是故同名表示而已所以者何十種真理本有法身有德方便十種如理薩般若慧有覺方便以此義故更重言詞作如是示此中所說二真如中當何真如謂清淨真如非染淨真如染淨真如字事差別其相云何頌曰清淨真如理不守自性故而能受染熏名染淨真如論曰清淨真如理從無始來平等平等自性清淨不生不滅亦無去來亦無住處而真如理性不守自性故隨緣動轉是故名為染淨真如二染淨智親所內證相應俱有不相捨離如是等義觀前所說比類應知以何義故強名虗空字事差別其相云何頌曰虗空有十義體雖同義事各各差別故謂無礙等義論曰性虗空理有十種義一無障礙義諸色法中無障礙故二周遍義無所不至故三平等義無簡擇故四廣大義無分際故五無相義絕色相故六清淨義無塵累故七不動義無成壞故八有空義滅有量故九空空義離空著故十無得義不能執故如是十事義用差別捨離二虗空中當何虗空謂清淨虗空非染淨虗空染淨虗空字事差別其相云何頌曰清淨虗空理不守自性故而能受染熏名染淨虗空論曰清淨虗空具足十德亦無染相亦無淨相而虗空性不守自性故能受染熏隨緣流轉是故名為染淨虗空能熏所熏建立誹謗等種種門至廣說分其理具顯已說字事門次說隨釋門所言覺義者者即是總句從此已下皆是別句總者通表一切覺故別者各各差別說故就別句中先說清淨本覺清淨始覺次說染淨本覺染淨始覺如其次第說相可見謂心體離念相者即是清淨本覺心謂即是自性清淨心體謂即是本有法身體如是心體即名本覺離念相者即是顯示清淨之義所謂遠離大無明念故言離念遠離四種無常之相故言離相過於恒沙煩惱眷屬此五有為以有根本是故舉本無示末眷屬皆空離念相者即唱清淨本覺人辭者即人故等虗空界無所不遍者如是覺者善證具足十種德義虗空理故法界一相者如是覺者於所證之真如法界而共和合一味一相無差別故即是如來平等法身者善證二種勝妙之理清淨覺者即是法身如來自性自體故依此法身說名本覺者本有法身自性德中而作歸依建立清淨本覺稱故本曰何以故本覺義者對始覺義說以始覺者即同本覺論曰此說清淨始覺何以故者即請問辭為欲建立清淨始覺作如是請問相云何謂有眾生作如是難本有法身從本已來具足無量性之功德常恒明常常恒自在依此義故名為本覺者如是本覺者於何時中何因緣故具足一切無量功德名本覺耶若作是說此本覺者有大智力能善斷除一切過患具足圓滿諸功德者即此本覺前惑後覺非本覺明即此功德不斷已前隱斷已後顯非自性明豈惑覺隱顯本有之義而得成立若作是說常斷更不斷常具足更不具足是故應有本斷本德者此義亦不成立無功德過故謂一切障從本斷說更不待斷一切功德從本具足更不待具足覺者即是始覺非彼本覺是故般若波羅蜜經說若覺者是始覺若不覺者即是無明若離此二者即名本覺以何義故作如是說本有法身自性德中而作歸依說名本覺故言何以故本覺義者對始覺說者直決彼疑謂馬鳴師自通而言清淨本覺從本已來不生不滅非建立有非誹謗無或非過患或非功德言語道絕心行處滅而有言說具足圓滿過於恒沙無量性德名曰本覺者當知從無始來而有清淨始覺發大智力發大定力於一切時於一切處常恒對治過於恒沙無量無邊過患之海具足圓滿過於恒沙無量無邊功德淨品對此清淨始覺者故立彼清淨本覺之稱以始覺者即同本覺者作其所由謂以自然始覺與彼本覺同故得對始覺示本覺故如是二覺熏習差別其相云何頌曰清淨本始覺從無始已來遠離一切染湛明若虗空是故此門中無能熏染法無所熏淨法唯有自家德論曰如是二覺無有能熏所熏差別唯有自家真實功德故此門中不應建立能熏所熏若如是者於此門中有何熏義所謂有熏染法淨法不相待成所謂即是具足轉熏此熏云何謂白白故三身本有契經云本有本覺本有始覺唯有德熏無患德熏唯有滿轉無分轉事故本曰始覺義者依本覺故而有不覺依不覺故說有始覺論曰此說離性二覺所謂通示離性本始依本覺故而有不覺者即是離性本覺依不覺故說有覺者即是離性始覺此義云何本覺般若不守自性故善受染熏彼諸染法令得住止即是本覺離性之義始覺般若不守自性故依諸染法如今方起被彼染誑故即是始覺離性之義始覺般若能斷諸障證諸功德何故說言始覺之智被染誑耶於無過法立諸過患斷除障故於無德法立諸功德證得理故若爾始覺於何時中而得離妄極解脫道時方得究竟離於彼時中到無念故本曰又以覺心源故名究竟覺不覺心源故非究竟覺論曰滿分二事下當顯示已說略說兩覺安立門卍云佚失中卷本末誠為可惜矣
